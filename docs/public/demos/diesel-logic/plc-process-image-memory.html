  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;script&gt;
  (() =&gt; {
    const root = document.getElementById(&#x27;plc-process-image&#x27;);
    if (!root) return;

    const steps = [
      {
        phase: &#x27;等待&#x27;,
        label: &#x27;等待：过程映像区保存上一扫描周期的快照&#x27;,
        detail: &#x27;I区和Q区是两块独立内存：I区供程序读取，Q区保存程序准备写给硬件的结果。&#x27;,
        fi: [0, 0, 1], di: [0, 0, 1], ii: [0, 0, 1],

      {

        detail: &#x27;现场触点已经变为1，但输入映像区仍保持旧快照0；硬件变化不会自动改写程序变量。&#x27;,
        fi: [1, 0, 1], di: [0, 0, 1], ii: [0, 0, 1],
        qi: [0, 0, 0], dout: [0, 0, 0], fo: [0, 0, 0],
        read: &#x27;I: [0,0,1]&#x27;, write: &#x27;Q: [0,0,0]&#x27;, state: &#x27;尚未采样&#x27;,
        active: [&#x27;fieldInput&#x27;]
      },
      {
        phase: &#x27;硬件采样&#x27;,
        label: &#x27;扫描开始①：DI模块把端子电压转换为通道位&#x27;,
        detail: &#x27;DI模块检测各端子是否有24 V，得到CH0=1、CH1=0、CH2=1。&#x27;,
        fi: [1, 0, 1], di: [1, 0, 1], ii: [0, 0, 1],
        qi: [0, 0, 0], dout: [0, 0, 0], fo: [0, 0, 0],
        read: &#x27;I: [0,0,1]&#x27;, write: &#x27;Q: [0,0,0]&#x27;, state: &#x27;DI采样完成&#x27;,
        active: [&#x27;diModule&#x27;], leds: { di: [1, 0, 1] }, arrow: &#x27;in1&#x27;, pulse: &#x27;in1&#x27;
      },
      {
        phase: &#x27;更新I区&#x27;,
        label: &#x27;扫描开始②：运行时把DI通道一次性复制到输入映像区&#x27;,
        detail: &#x27;硬件组态建立固定映射：DI CH0→%IX0.0，CH1→%IX0.1，CH2→%IX0.2。&#x27;,
        fi: [1, 0, 1], di: [1, 0, 1], ii: [1, 0, 1],
        qi: [0, 0, 0], dout: [0, 0, 0], fo: [0, 0, 0],
        read: &#x27;I: [1,0,1]&#x27;, write: &#x27;Q: [0,0,0]&#x27;, state: &#x27;I区快照已更新&#x27;,
        active: [&#x27;inputImage&#x27;], rows: [&#x27;irow0&#x27;, &#x27;irow1&#x27;, &#x27;irow2&#x27;],
        leds: { di: [1, 0, 1] }, arrow: &#x27;in2&#x27;, pulse: &#x27;in2&#x27;
      },
      {
        phase: &#x27;程序读取&#x27;,
        label: &#x27;程序执行①：程序读取稳定的I区快照，不逐点访问现场端子&#x27;,
        detail: &#x27;本次扫描期间，即使现场再次变化，普通程序看到的I区快照仍保持不变。&#x27;,
        fi: [1, 0, 1], di: [1, 0, 1], ii: [1, 0, 1],
        qi: [0, 0, 0], dout: [0, 0, 0], fo: [0, 0, 0],
        read: &#x27;I: [1,0,1]&#x27;, write: &#x27;Q: [0,0,0]&#x27;, state: &#x27;读取BusDeadRaw=1&#x27;,
        active: [&#x27;program&#x27;], rows: [&#x27;irow0&#x27;],
        leds: { di: [1, 0, 1] }, arrow: &#x27;in3&#x27;, pulse: &#x27;in3&#x27;
      },
      {
        phase: &#x27;程序运算&#x27;,
        label: &#x27;程序执行②：定时与许可逻辑计算出DG_Start_CMD=1&#x27;,
        detail: &#x27;这是内存运算；此刻物理DO仍为0，启动继电器也仍未动作。&#x27;,
        fi: [1, 0, 1], di: [1, 0, 1], ii: [1, 0, 1],
        qi: [0, 0, 0], dout: [0, 0, 0], fo: [0, 0, 0],
        read: &#x27;I: [1,0,1]&#x27;, write: &#x27;Q: [0,0,0]&#x27;, state: &#x27;计算DG_Start_CMD=1&#x27;,
        active: [&#x27;program&#x27;], leds: { di: [1, 0, 1] }
      },
      {
        phase: &#x27;写入Q区&#x27;,
        label: &#x27;程序执行③：程序把结果写入输出过程映像区&#x27;,
        detail: &#x27;DG_Start_CMD映射到%QX0.0，因此Q区变为[1,0,0]；DO模块暂时仍保持[0,0,0]。&#x27;,
        fi: [1, 0, 1], di: [1, 0, 1], ii: [1, 0, 1],
        qi: [1, 0, 0], dout: [0, 0, 0], fo: [0, 0, 0],
        read: &#x27;I: [1,0,1]&#x27;, write: &#x27;Q: [1,0,0]&#x27;, state: &#x27;Q区等待提交&#x27;,
        active: [&#x27;outputImage&#x27;], rows: [&#x27;qrow0&#x27;],
        leds: { di: [1, 0, 1] }, arrow: &#x27;out1&#x27;, pulse: &#x27;out1&#x27;
      },
      {
        phase: &#x27;提交输出&#x27;,
        label: &#x27;扫描结束①：运行时把整个Q区复制到DO模块&#x27;,
        detail: &#x27;硬件组态建立反向映射：%QX0.0→DO CH0，%QX0.1→CH1，%QX0.2→CH2。&#x27;,
        fi: [1, 0, 1], di: [1, 0, 1], ii: [1, 0, 1],
        qi: [1, 0, 0], dout: [1, 0, 0], fo: [0, 0, 0],
        read: &#x27;I: [1,0,1]&#x27;, write: &#x27;Q: [1,0,0]&#x27;, state: &#x27;Q区已提交硬件&#x27;,
        active: [&#x27;doModule&#x27;], rows: [&#x27;qrow0&#x27;],
        leds: { di: [1, 0, 1], dout: [1, 0, 0] }, arrow: &#x27;out2&#x27;, pulse: &#x27;out2&#x27;
      },
      {
        phase: &#x27;现场动作&#x27;,
        label: &#x27;扫描结束②：DO CH0输出24 V，KR1启动继电器吸合&#x27;,
        detail: &#x27;输出映像区的1最终成为真实电压，驱动现场执行设备。&#x27;,
        fi: [1, 0, 1], di: [1, 0, 1], ii: [1, 0, 1],
        qi: [1, 0, 0], dout: [1, 0, 0], fo: [1, 0, 0],
        read: &#x27;I: [1,0,1]&#x27;, write: &#x27;Q: [1,0,0]&#x27;, state: &#x27;KR1吸合，柴发启动&#x27;,
        active: [&#x27;fieldOutput&#x27;], rows: [&#x27;qrow0&#x27;],
        leds: { di: [1, 0, 1], dout: [1, 0, 0] }, arrow: &#x27;out3&#x27;, pulse: &#x27;out3&#x27;
      },
      {
        phase: &#x27;下一扫描&#x27;,
        label: &#x27;下一扫描：柴发运行反馈先到DI，再在新的扫描开始更新I区&#x27;,
        detail: &#x27;反馈闭环再次走“现场→DI→I区→程序”；这就是PLC周期控制的完整闭环。&#x27;,
        fi: [1, 1, 1], di: [1, 1, 1], ii: [1, 1, 1],
        qi: [1, 0, 0], dout: [1, 0, 0], fo: [1, 0, 0],
        read: &#x27;I: [1,1,1]&#x27;, write: &#x27;Q: [1,0,0]&#x27;, state: &#x27;DG_Running=1&#x27;,
        active: [&#x27;fieldInput&#x27;, &#x27;diModule&#x27;, &#x27;inputImage&#x27;], rows: [&#x27;irow1&#x27;],
        leds: { di: [1, 1, 1], dout: [1, 0, 0] }, arrow: &#x27;in2&#x27;, pulse: &#x27;in2&#x27;
      }
    ];

    const el = {
      play: root.querySelector(&#x27;#pi-play&#x27;),
      prev: root.querySelector(&#x27;#pi-prev&#x27;),
      next: root.querySelector(&#x27;#pi-next&#x27;),
      reset: root.querySelector(&#x27;#pi-reset&#x27;),
      counter: root.querySelector(&#x27;#pi-counter&#x27;),
      phase: root.querySelector(&#x27;#pi-phase&#x27;),
      detail: root.querySelector(&#x27;#pi-detail-text&#x27;),
      phaseLabel: root.querySelector(&#x27;#pi-phase-label&#x27;),
      progress: root.querySelector(&#x27;#pi-progress&#x27;),
      fieldInput: root.querySelector(&#x27;#pi-field-input&#x27;),
      diModule: root.querySelector(&#x27;#pi-di-module&#x27;),
      inputImage: root.querySelector(&#x27;#pi-input-image&#x27;),
      program: root.querySelector(&#x27;#pi-program&#x27;),
      outputImage: root.querySelector(&#x27;#pi-output-image&#x27;),
      doModule: root.querySelector(&#x27;#pi-do-module&#x27;),
      fieldOutput: root.querySelector(&#x27;#pi-field-output&#x27;),
      fi: [0, 1, 2].map(i =&gt; root.querySelector(&#x27;#pi-fi&#x27; + i)),
      di: [0, 1, 2].map(i =&gt; root.querySelector(&#x27;#pi-di&#x27; + i)),
      ii: [0, 1, 2].map(i =&gt; root.querySelector(&#x27;#pi-ii&#x27; + i)),
      qi: [0, 1, 2].map(i =&gt; root.querySelector(&#x27;#pi-qi&#x27; + i)),
      dout: [0, 1, 2].map(i =&gt; root.querySelector(&#x27;#pi-do&#x27; + i)),
      fo: [0, 1, 2].map(i =&gt; root.querySelector(&#x27;#pi-fo&#x27; + i)),
      diLeds: [0, 1, 2].map(i =&gt; root.querySelector(&#x27;#pi-di-led&#x27; + i)),
      doLeds: [0, 1, 2].map(i =&gt; root.querySelector(&#x27;#pi-do-led&#x27; + i)),
      rows: {
        irow0: root.querySelector(&#x27;#pi-irow0&#x27;),
        irow1: root.querySelector(&#x27;#pi-irow1&#x27;),
        irow2: root.querySelector(&#x27;#pi-irow2&#x27;),
        qrow0: root.querySelector(&#x27;#pi-qrow0&#x27;),
        qrow1: root.querySelector(&#x27;#pi-qrow1&#x27;),
        qrow2: root.querySelector(&#x27;#pi-qrow2&#x27;)
      },
      arrows: {
        in1: root.querySelector(&#x27;#pi-in-arrow-1&#x27;),
        in2: root.querySelector(&#x27;#pi-in-arrow-2&#x27;),
        in3: root.querySelector(&#x27;#pi-in-arrow-3&#x27;),
        out1: root.querySelector(&#x27;#pi-out-arrow-1&#x27;),
        out2: root.querySelector(&#x27;#pi-out-arrow-2&#x27;),
        out3: root.querySelector(&#x27;#pi-out-arrow-3&#x27;)
      },
      read: root.querySelector(&#x27;#pi-program-read&#x27;),
      write: root.querySelector(&#x27;#pi-program-write&#x27;),
      state: root.querySelector(&#x27;#pi-program-state&#x27;),
      pulse: root.querySelector(&#x27;#pi-pulse&#x27;)
    };

    const routes = {
      in1: [[182, 140], [224, 140]],
      in2: [[382, 140], [424, 140]],
      in3: [[734, 140], [776, 140]],
      out1: [[776, 410], [734, 410]],
      out2: [[424, 410], [382, 410]],
      out3: [[224, 410], [182, 410]]
    };

    let index = 0;
    let timer = null;
    let playing = false;
    let pulseToken = 0;

    function showBits(nodes, values) {
      nodes.forEach((node, i) =&gt; {
        node.textContent = String(values[i]);
      });
    }

    function setPlaying(value) {
      playing = value;
      if (timer) clearInterval(timer);
      timer = null;
      el.play.innerHTML = &#x27;&lt;i data-lucide=&quot;&#x27; + (playing ? &#x27;pause&#x27; : &#x27;play&#x27;) + &#x27;&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span&gt;&#x27; + (playing ? &#x27;暂停&#x27; : &#x27;播放&#x27;) + &#x27;&lt;/span&gt;&#x27;;
      if (window.lucide) lucide.createIcons({ attrs: { width: 16, height: 16 } });
      if (playing) {
        timer = setInterval(() =&gt; {
          if (index &gt;= steps.length - 1) {
            setPlaying(false);
            return;
          }
          index += 1;
          render();
        }, 2400);
      }
    }

    function animate(routeName) {
      pulseToken += 1;
      const token = pulseToken;
      const points = routes[routeName];
      el.pulse.classList.toggle(&#x27;visible&#x27;, Boolean(points));
      if (!points) return;
      const start = performance.now();
      function frame(now) {
        if (token !== pulseToken) return;
        const t = ((now - start) % 1100) / 1100;
        const x = points[0][0] + (points[1][0] - points[0][0]) * t;
        const y = points[0][1] + (points[1][1] - points[0][1]) * t;
        el.pulse.setAttribute(&#x27;transform&#x27;, &#x27;translate(&#x27; + x.toFixed(1) + &#x27; &#x27; + y.toFixed(1) + &#x27;)&#x27;);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    function render() {
      const s = steps[index];
      el.counter.textContent = &#x27;步骤 &#x27; + (index + 1) + &#x27; / &#x27; + steps.length;
      el.phase.textContent = s.phase;
      el.detail.textContent = s.detail;
      el.phaseLabel.textContent = s.label;
      el.progress.setAttribute(&#x27;width&#x27;, String((index / (steps.length - 1)) * 924));
      showBits(el.fi, s.fi);
      showBits(el.di, s.di);
      showBits(el.ii, s.ii);
      showBits(el.qi, s.qi);
      showBits(el.dout, s.dout);
      showBits(el.fo, s.fo);
      el.read.textContent = s.read;
      el.write.textContent = s.write;
      el.state.textContent = s.state;

      [&#x27;fieldInput&#x27;, &#x27;diModule&#x27;, &#x27;inputImage&#x27;, &#x27;program&#x27;, &#x27;outputImage&#x27;, &#x27;doModule&#x27;, &#x27;fieldOutput&#x27;]
        .forEach(name =&gt; el[name].classList.toggle(&#x27;active&#x27;, (s.active || []).includes(name)));
      Object.entries(el.rows).forEach(([name, node]) =&gt; {
        node.classList.toggle(&#x27;active&#x27;, (s.rows || []).includes(name));
      });
      Object.entries(el.arrows).forEach(([name, node]) =&gt; {
        node.classList.toggle(&#x27;live&#x27;, s.arrow === name);
      });

      const diLedValues = s.leds?.di || [0, 0, 1];
      const doLedValues = s.leds?.dout || [0, 0, 0];
      el.diLeds.forEach((node, i) =&gt; node.classList.toggle(&#x27;on&#x27;, Boolean(diLedValues[i])));
      el.doLeds.forEach((node, i) =&gt; node.classList.toggle(&#x27;on&#x27;, Boolean(doLedValues[i])));

      el.prev.disabled = index === 0;
      el.next.disabled = index === steps.length - 1;
      animate(s.pulse);
    }

    el.play.addEventListener(&#x27;click&#x27;, () =&gt; {
      if (!playing &amp;&amp; index === steps.length - 1) {
        index = 0;
        render();
      }
      setPlaying(!playing);
    });
    el.prev.addEventListener(&#x27;click&#x27;, () =&gt; {
      setPlaying(false);
      index = Math.max(0, index - 1);
      render();
    });
    el.next.addEventListener(&#x27;click&#x27;, () =&gt; {
      setPlaying(false);
      index = Math.min(steps.length - 1, index + 1);
      render();
    });
    el.reset.addEventListener(&#x27;click&#x27;, () =&gt; {
      setPlaying(false);
      index = 0;
      render();
    });

    render();
  })();
&lt;/script&gt;

&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)

  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;

  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
