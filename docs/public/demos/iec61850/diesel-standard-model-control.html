html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;

&lt;style&gt;
  #diesel-standard-model-control {
    color: var(--foreground);
    display: grid;
    gap: 16px;
    width: 100%;
  }

  #diesel-standard-model-control .dc-scenario {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 12px;
    align-items: baseline;
  }

  #diesel-standard-model-control .dc-flow {
    display: grid;
    grid-template-columns: minmax(100px, 1fr) 28px minmax(100px, 1fr) 28px minmax(120px, 1.15fr) 28px minmax(110px, 1fr) 28px minmax(110px, 1fr);
    align-items: center;
    gap: 6px;
    padding: 18px 0;
  }

  #diesel-standard-model-control .dc-node {
    display: grid;
    justify-items: center;
    align-content: center;
    gap: 7px;
    min-height: 118px;
    text-align: center;
    transition: transform 220ms ease, opacity 220ms ease;
  }

  #diesel-standard-model-control .dc-node strong {
    font-weight: 500;
  }

  #diesel-standard-model-control .dc-icon {
    display: inline-grid;
    place-items: center;
    width: 42px;
    height: 42px;
    border-radius: 999px;
    color: var(--muted-foreground);
    background: color-mix(in srgb, var(--muted) 70%, transparent);
    transition: color 220ms ease, background 220ms ease, transform 220ms ease;
  }

  #diesel-standard-model-control .dc-node.is-active {
    transform: translateY(-4px);
  }

  #diesel-standard-model-control .dc-node.is-active .dc-icon {
    color: var(--primary-foreground);
    background: var(--primary);
    transform: scale(1.08);
  }

  #diesel-standard-model-control .dc-node.is-complete .dc-icon {
    color: var(--foreground);
    background: color-mix(in srgb, var(--viz-series-1) 18%, var(--background));
  }

  #diesel-standard-model-control .dc-link {
    color: var(--border);
    display: grid;
    place-items: center;
    transition: color 220ms ease, transform 220ms ease;
  }

  #diesel-standard-model-control .dc-link.is-active {
    color: var(--viz-series-1);
    animation: dc-pulse 900ms ease-in-out infinite alternate;
  }

  #diesel-standard-model-control .dc-detail {
    display: grid;
    gap: 14px;
  }

  #diesel-standard-model-control .dc-detail-head {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
  }

  #diesel-standard-model-control .dc-detail-head strong {
    font-weight: 500;
  }

  #diesel-standard-model-control .dc-detail-grid {
    display: grid;
    grid-template-columns: minmax(150px, 0.9fr) minmax(180px, 1.2fr) minmax(180px, 1.2fr);
    gap: 16px;
  }

  #diesel-standard-model-control .dc-detail-grid &gt; div {
    display: grid;
    align-content: start;
    gap: 5px;
  }

  #diesel-standard-model-control .dc-detail-grid code {
    overflow-wrap: anywhere;
  }

  #diesel-standard-model-control .dc-progress {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 5px;
  }

  #diesel-standard-model-control .dc-progress span {
    height: 4px;
    border-radius: 999px;
    background: var(--muted);
  }

  #diesel-standard-model-control .dc-progress span.is-current {
    background: var(--primary);
  }

  #diesel-standard-model-control .dc-progress span.is-complete {
    background: color-mix(in srgb, var(--viz-series-1) 52%, var(--muted));
  }

  @keyframes dc-pulse {
    from { transform: translateX(-2px); opacity: 0.55; }
    to { transform: translateX(2px); opacity: 1; }
  }

  @media (max-width: 640px) {
    #diesel-standard-model-control .dc-flow {
      grid-template-columns: 1fr;
      padding: 4px 0;
    }

    #diesel-standard-model-control .dc-node {
      min-height: 86px;
    }

    #diesel-standard-model-control .dc-link {
      transform: rotate(90deg);
    }

    #diesel-standard-model-control .dc-link.is-active {
      animation-name: dc-pulse-mobile;
    }

    #diesel-standard-model-control .dc-detail-grid {
      grid-template-columns: 1fr;
    }
  }

  @keyframes dc-pulse-mobile {
    from { transform: rotate(90deg) translateX(-2px); opacity: 0.55; }
    to { transform: rotate(90deg) translateX(2px); opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    #diesel-standard-model-control .dc-node,
    #diesel-standard-model-control .dc-icon,
    #diesel-standard-model-control .dc-link {
      transition: none;
      animation: none;
    }
  }
&lt;/style&gt;

&lt;script&gt;
  (() =&gt; {
    const root = document.getElementById(&quot;diesel-standard-model-control&quot;);
    if (!root) return;

    const steps = [
      {
        phase: &quot;检测事件&quot;,
        title: &quot;市电电压跌落&quot;,
        object: &quot;MMXU_GRID1.PhV = 0 V&quot;,
        action: &quot;母线测量对象产生变化报告，EMS收到失电事件。&quot;,
        boundary: &quot;61850负责把“电压为0、质量有效、发生时间”送到EMS。&quot;,
        active: [&quot;grid&quot;],
        links: [&quot;grid-ems&quot;],
        statuses: { grid: &quot;市电失电&quot;, ems: &quot;收到报告&quot;, gateway: &quot;模型在线&quot;, controller: &quot;停机可用&quot;, breaker: &quot;分位&quot; }
      },
      {
        phase: &quot;条件判断&quot;,
        title: &quot;EMS按统一对象检查启动条件&quot;,
        object: &quot;运行状态=stopped · 控制模式=remote · XCBR1.Pos=open&quot;,
        action: &quot;EMS确认柴发可远方启动、无闭锁、出口断路器处于分位。&quot;,
        boundary: &quot;判断逻辑在EMS；条件数据来自标准状态、测量和开关对象。&quot;,
        active: [&quot;ems&quot;],
        links: [],
        statuses: { grid: &quot;市电失电&quot;, ems: &quot;条件满足&quot;, gateway: &quot;状态已上送&quot;, controller: &quot;远方／可用&quot;, breaker: &quot;分位&quot; }
      },
      {
        phase: &quot;高层控制&quot;,
        title: &quot;EMS发出“启动柴发”控制&quot;,
        object: &quot;Operate → DRCC1 启动控制对象&quot;,
        action: &quot;EMS使用61850控制服务发送一次高层启动请求，并等待控制确认。&quot;,
        boundary: &quot;具体DO由项目采用的IEC 61850-7-420版本和应用配置文件确定。&quot;,
        active: [&quot;ems&quot;, &quot;gateway&quot;],
        links: [&quot;ems-gateway&quot;],
        statuses: { grid: &quot;市电失电&quot;, ems: &quot;已发启动命令&quot;, gateway: &quot;校验控制&quot;, controller: &quot;等待请求&quot;, breaker: &quot;分位&quot; }
      },
      {
        phase: &quot;协议映射&quot;,
        title: &quot;网关把标准控制映射给现有柴发&quot;,
        object: &quot;DRCC1启动控制 → Modbus Coil 00025 = 1&quot;,
        action: &quot;网关校验权限和控制参数后，将命令翻译成柴发控制器支持的接口。&quot;,
        boundary: &quot;厂家点位差异被限制在网关映射层，EMS不再识别00025。&quot;,
        active: [&quot;gateway&quot;, &quot;controller&quot;],
        links: [&quot;gateway-controller&quot;],
        statuses: { grid: &quot;市电失电&quot;, ems: &quot;等待反馈&quot;, gateway: &quot;执行映射&quot;, controller: &quot;收到启动请求&quot;, breaker: &quot;分位&quot; }
      },
      {
        phase: &quot;本地时序&quot;,
        title: &quot;柴发控制器执行安全启动程序&quot;,
        object: &quot;预润滑 → 启动马达 → 建立转速 → 建立电压&quot;,
        action: &quot;控制器在本地检查急停、油压和水温，完成厂家规定的启动时序。&quot;,
        boundary: &quot;安全联锁和毫秒／秒级时序仍由设备控制器负责，不下放给EMS。&quot;,
        active: [&quot;controller&quot;],
        links: [],
        statuses: { grid: &quot;市电失电&quot;, ems: &quot;等待运行&quot;, gateway: &quot;状态转发&quot;, controller: &quot;starting&quot;, breaker: &quot;分位&quot; }
      },
      {
        phase: &quot;状态反馈&quot;,
        title: &quot;模型报告柴发已经稳定运行&quot;,
        object: &quot;运行状态=running · MMXU1.Hz=50.00 Hz · PhV=400 V&quot;,
        action: &quot;网关将控制器反馈映射成状态和测量对象，通过报告主动送给EMS。&quot;,
        boundary: &quot;EMS看到的是统一的running、Hz和PhV，不解析厂家状态码。&quot;,
        active: [&quot;controller&quot;, &quot;gateway&quot;, &quot;ems&quot;],
        links: [&quot;gateway-controller&quot;, &quot;ems-gateway&quot;],
        statuses: { grid: &quot;市电失电&quot;, ems: &quot;运行确认&quot;, gateway: &quot;报告已上送&quot;, controller: &quot;running&quot;, breaker: &quot;分位&quot; }
      },
      {
        phase: &quot;合闸控制&quot;,
        title: &quot;联锁允许后合上出口断路器&quot;,
        object: &quot;CILO1.EnaCls=true → CSWI1.Pos.Oper=close&quot;,
        action: &quot;EMS发出合闸控制，开关控制功能执行，断路器本体返回实际位置。&quot;,
        boundary: &quot;CILO表达“是否允许”，CSWI负责控制，XCBR负责反馈本体位置。&quot;,
        active: [&quot;ems&quot;, &quot;gateway&quot;, &quot;breaker&quot;],
        links: [&quot;ems-gateway&quot;, &quot;controller-breaker&quot;],
        statuses: { grid: &quot;市电失电&quot;, ems: &quot;发出合闸&quot;, gateway: &quot;控制转发&quot;, controller: &quot;running&quot;, breaker: &quot;正在合闸&quot; }
      },
      {
        phase: &quot;带载完成&quot;,
        title: &quot;柴发向母线供电&quot;,
        object: &quot;XCBR1.Pos=on · MMXU1.TotW=650 kW · q=good&quot;,
        action: &quot;EMS确认断路器合位、有功功率建立，启动控制流程结束。&quot;,
        boundary: &quot;同类柴发复用同一控制流程，只替换IED实例和工程配置。&quot;,
        active: [&quot;grid&quot;, &quot;ems&quot;, &quot;gateway&quot;, &quot;controller&quot;, &quot;breaker&quot;],
        links: [&quot;grid-ems&quot;, &quot;ems-gateway&quot;, &quot;gateway-controller&quot;, &quot;controller-breaker&quot;],
        statuses: { grid: &quot;柴发供电&quot;, ems: &quot;流程完成&quot;, gateway: &quot;模型运行&quot;, controller: &quot;650 kW&quot;, breaker: &quot;合位&quot; }
      }
    ];

    let index = 0;
    let timer = null;

    const phase = root.querySelector(&quot;[data-phase]&quot;);
    const title = root.querySelector(&quot;[data-title]&quot;);
    const object = root.querySelector(&quot;[data-object]&quot;);
    const actionText = root.querySelector(&quot;[data-action-text]&quot;);
    const boundary = root.querySelector(&quot;[data-boundary]&quot;);
    const stepLabel = root.querySelector(&quot;[data-step-label]&quot;);
    const playButton = root.querySelector(&quot;[data-action=&#x27;play&#x27;]&quot;);
    const playLabel = playButton.querySelector(&quot;span&quot;);
    const progress = Array.from(root.querySelectorAll(&quot;.dc-progress span&quot;));

    function render() {
      const step = steps[index];
      phase.textContent = step.phase;
      title.textContent = step.title;
      object.textContent = step.object;
      actionText.textContent = step.action;
      boundary.textContent = step.boundary;
      stepLabel.textContent = `${index + 1} / ${steps.length}`;

      root.querySelectorAll(&quot;[data-node]&quot;).forEach((node) =&gt; {
        const name = node.getAttribute(&quot;data-node&quot;);
        node.classList.toggle(&quot;is-active&quot;, step.active.includes(name));
        node.classList.toggle(&quot;is-complete&quot;, !step.active.includes(name) &amp;&amp; index &gt; 0);
      });

      root.querySelectorAll(&quot;[data-link]&quot;).forEach((link) =&gt; {
        link.classList.toggle(&quot;is-active&quot;, step.links.includes(link.getAttribute(&quot;data-link&quot;)));
      });

      Object.entries(step.statuses).forEach(([name, value]) =&gt; {
        const target = root.querySelector(`[data-node-status=&quot;${name}&quot;]`);
        if (target) target.textContent = value;
      });

      progress.forEach((item, progressIndex) =&gt; {
        item.classList.toggle(&quot;is-current&quot;, progressIndex === index);
        item.classList.toggle(&quot;is-complete&quot;, progressIndex &lt; index);
      });
    }

    function stop() {
      if (timer) window.clearInterval(timer);
      timer = null;
      playButton.classList.add(&quot;btn-primary&quot;);
      playLabel.textContent = index === steps.length - 1 ? &quot;重新演示&quot; : &quot;开始演示&quot;;
    }

    function play() {
      if (timer) {
        stop();
        return;
      }
      if (index === steps.length - 1) index = 0;
      render();
      playButton.classList.remove(&quot;btn-primary&quot;);
      playLabel.textContent = &quot;暂停&quot;;
      timer = window.setInterval(() =&gt; {
        if (index &gt;= steps.length - 1) {
          stop();
          return;
        }
        index += 1;
        render();
      }, 2600);
    }

    playButton.addEventListener(&quot;click&quot;, play);
    root.querySelector(&quot;[data-action=&#x27;prev&#x27;]&quot;).addEventListener(&quot;click&quot;, () =&gt; {
      stop();
      index = Math.max(0, index - 1);
      render();
    });
    root.querySelector(&quot;[data-action=&#x27;next&#x27;]&quot;).addEventListener(&quot;click&quot;, () =&gt; {
      stop();
      index = Math.min(steps.length - 1, index + 1);
      render();
    });

    render();
  })();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;

  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );

      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }

    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);

      return;
    }

    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }

  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }

    }

    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
