.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;div id=&quot;custom-to-config&quot;&gt;
  &lt;style&gt;
    #custom-to-config { width: 100%; color: var(--foreground); }
    #custom-to-config * { box-sizing: border-box; }
    #custom-to-config .case { text-align: center; padding: 11px 0; border-bottom: 1px solid var(--border); font-weight: 500; }
    #custom-to-config .tabs { display: grid; grid-template-columns: repeat(7, 1fr); margin: 12px 0; }
    #custom-to-config .tab { text-align: center; padding: 7px 2px; color: var(--muted-foreground); border-bottom: 3px solid var(--border); }
    #custom-to-config .tab.active { color: var(--foreground); border-color: var(--viz-series-1); font-weight: 500; }
    #custom-to-config .stage { position: relative; min-height: 485px; overflow: hidden; }
    #custom-to-config .scene { position: absolute; inset: 0; display: grid; align-content: center; opacity: 0; transform: translateX(28px); pointer-events: none; transition: opacity .35s ease, transform .35s ease; }
    #custom-to-config .scene.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
    #custom-to-config .scene.exit { transform: translateX(-28px); }
    #custom-to-config .headline { text-align: center; margin-bottom: 23px; }
    #custom-to-config .headline b { display: block; margin-bottom: 5px; font-weight: 500; }
    #custom-to-config .headline span { color: var(--muted-foreground); }
    #custom-to-config .fleet { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    #custom-to-config .machine { padding: 14px 8px; min-height: 126px; display: grid; place-items: center; align-content: center; gap: 7px; text-align: center; background: color-mix(in srgb, var(--muted) 70%, transparent); }
    #custom-to-config .machine b { font-weight: 500; }
    #custom-to-config .machine small { color: var(--muted-foreground); }
    #custom-to-config .ems { width: min(420px, 85%); margin: 22px auto 0; padding: 13px; text-align: center; background: color-mix(in srgb, var(--viz-series-1) 13%, transparent); border-top: 3px solid var(--viz-series-1); }
    #custom-to-config .inputs { width: min(670px, 98%); margin: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    #custom-to-config .input-col { text-align: center; }
    #custom-to-config .input-col b { display: block; margin-bottom: 8px; font-weight: 500; }
    #custom-to-config .input-col code { display: block; padding: 8px 5px; margin: 5px 0; background: var(--muted); color: var(--foreground); }
    #custom-to-config .warn { margin-top: 20px; text-align: center; color: var(--destructive); }
    #custom-to-config .adapter-list { width: min(680px, 99%); margin: auto; display: grid; gap: 10px; }
    #custom-to-config .adapter-row { display: grid; grid-template-columns: 82px repeat(4, 1fr); gap: 6px; align-items: stretch; }
    #custom-to-config .vendor { display: grid; place-items: center; font-weight: 500; }
    #custom-to-config .code-task { padding: 10px 5px; text-align: center; background: color-mix(in srgb, var(--destructive) 10%, transparent); border-top: 2px solid var(--destructive); animation: build .35s both; animation-delay: calc(var(--n) * .1s); }
    #custom-to-config .code-task small { display: block; color: var(--muted-foreground); margin-top: 4px; }
    #custom-to-config .sum { margin-top: 20px; text-align: center; font-weight: 500; }
    #custom-to-config .ripple { width: min(650px, 97%); margin: auto; display: grid; grid-template-columns: 130px 1fr; gap: 9px 14px; align-items: center; }
    #custom-to-config .change { grid-row: 1 / 6; padding: 18px 9px; text-align: center; background: color-mix(in srgb, var(--destructive) 12%, transparent); border-left: 3px solid var(--destructive); }
    #custom-to-config .impact { padding: 9px 12px; background: var(--muted); position: relative; animation: shake-in .4s both; animation-delay: calc(var(--n) * .12s); }
    #custom-to-config .impact::before { content: &quot;→&quot;; position: absolute; left: -16px; color: var(--destructive); }
    #custom-to-config .boundary { width: min(680px, 99%); margin: auto; display: grid; grid-template-columns: 1fr auto 1.25fr; gap: 12px; align-items: center; }
    #custom-to-config .inside { display: grid; gap: 7px; }
    #custom-to-config .inside span { padding: 8px; text-align: center; background: var(--muted); }
    #custom-to-config .map-arrow { color: var(--viz-series-1); text-align: center; }
    #custom-to-config .map-arrow b { display: block; color: var(--foreground); font-weight: 500; margin-bottom: 5px; }
    #custom-to-config .facade { display: grid; gap: 7px; }
    #custom-to-config .facade span { padding: 9px; background: color-mix(in srgb, var(--viz-series-1) 13%, transparent); border-left: 3px solid var(--viz-series-1); animation: build .35s both; animation-delay: calc(var(--n) * .12s); }
    #custom-to-config .owner { margin-top: 19px; text-align: center; font-weight: 500; }
    #custom-to-config .engineering { width: min(680px, 99%); margin: auto; display: grid; grid-template-columns: 1fr auto 1.2fr auto 1fr; gap: 7px; align-items: center; }
    #custom-to-config .file, #custom-to-config .tool, #custom-to-config .output { min-height: 130px; padding: 12px 8px; display: grid; place-items: center; align-content: center; gap: 8px; text-align: center; }
    #custom-to-config .file { background: color-mix(in srgb, var(--viz-series-2) 14%, transparent); border-top: 3px solid var(--viz-series-2); }
    #custom-to-config .tool { background: color-mix(in srgb, var(--viz-series-1) 13%, transparent); border-top: 3px solid var(--viz-series-1); }
    #custom-to-config .output { background: var(--muted); }
    #custom-to-config .checks { display: grid; gap: 5px; text-align: left; }
    #custom-to-config .checks span::before { content: &quot;✓ &quot;; color: var(--viz-series-1); }
    #custom-to-config .no-code { margin-top: 18px; text-align: center; color: var(--muted-foreground); }
    #custom-to-config .running { width: min(690px, 99%); margin: auto; display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; }
    #custom-to-config .standard-stream { text-align: center; min-width: 175px; }
    #custom-to-config .standard-stream b { display: block; margin-bottom: 8px; font-weight: 500; }
    #custom-to-config .objects { display: grid; gap: 5px; }
    #custom-to-config .objects code { padding: 6px; background: color-mix(in srgb, var(--viz-series-1) 13%, transparent); }
    #custom-to-config .same-app { padding: 16px 9px; text-align: center; background: var(--muted); }
    #custom-to-config .same-app b { display: block; margin-bottom: 8px; font-weight: 500; }
    #custom-to-config .takeaway { margin-top: 21px; text-align: center; font-weight: 500; }
    #custom-to-config .controls { justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--border); }
    #custom-to-config .count { color: var(--muted-foreground); }
    @keyframes build { from { opacity: 0; transform: scaleX(.75); transform-origin: left; } to { opacity: 1; transform: scaleX(1); transform-origin: left; } }
    @keyframes shake-in { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
    @media (max-width: 620px) {
      #custom-to-config .tabs { grid-template-columns: repeat(4, 1fr); }
      #custom-to-config .stage { min-height: 630px; }
      #custom-to-config .fleet { gap: 6px; }
      #custom-to-config .inputs { gap: 6px; }
      #custom-to-config .adapter-row { grid-template-columns: 62px 1fr 1fr; }
      #custom-to-config .code-task:nth-child(n+4) { margin-top: 3px; }
      #custom-to-config .boundary, #custom-to-config .engineering, #custom-to-config .running { grid-template-columns: 1fr; }
      #custom-to-config .map-arrow, #custom-to-config .engineering &gt; svg { transform: rotate(90deg); margin: auto; }
      #custom-to-config .file, #custom-to-config .tool, #custom-to-config .output { min-height: 84px; }
      #custom-to-config .ripple { grid-template-columns: 95px 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      #custom-to-config *, #custom-to-config *::before, #custom-to-config *::after { animation: none !important; transition: none !important; }
    }
  &lt;/style&gt;

  &lt;div class=&quot;case&quot;&gt;具体目标：把 A、B、C 三个厂家的柴油发电机组接入同一个 EMS&lt;/div&gt;
  &lt;div class=&quot;tabs&quot; aria-hidden=&quot;true&quot;&gt;
    &lt;div class=&quot;tab active&quot;&gt;① 项目目标&lt;/div&gt;&lt;div class=&quot;tab&quot;&gt;② 厂家差异&lt;/div&gt;&lt;div class=&quot;tab&quot;&gt;③ 重复开发&lt;/div&gt;&lt;div class=&quot;tab&quot;&gt;④ 变更代价&lt;/div&gt;&lt;div class=&quot;tab&quot;&gt;⑤ 责任转移&lt;/div&gt;&lt;div class=&quot;tab&quot;&gt;⑥ 工程配置&lt;/div&gt;&lt;div class=&quot;tab&quot;&gt;⑦ 运行结果&lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;stage&quot; role=&quot;region&quot; aria-live=&quot;polite&quot; aria-label=&quot;从设备定制开发到统一模型配置的柴油机组接入动画&quot;&gt;
    &lt;section class=&quot;scene active&quot;&gt;
      &lt;div class=&quot;headline&quot;&gt;&lt;b&gt;三台机组，EMS需要完成同样的业务&lt;/b&gt;&lt;span&gt;品牌不同，但都要监视功率、状态、告警，并执行启停&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;fleet&quot;&gt;
        &lt;div class=&quot;machine&quot;&gt;&lt;i data-lucide=&quot;cog&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;b&gt;A 厂柴油机&lt;/b&gt;&lt;small&gt;控制器 A&lt;/small&gt;&lt;/div&gt;
        &lt;div class=&quot;machine&quot;&gt;&lt;i data-lucide=&quot;cog&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;b&gt;B 厂柴油机&lt;/b&gt;&lt;small&gt;控制器 B&lt;/small&gt;&lt;/div&gt;
        &lt;div class=&quot;machine&quot;&gt;&lt;i data-lucide=&quot;cog&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;b&gt;C 厂柴油机&lt;/b&gt;&lt;small&gt;控制器 C&lt;/small&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;ems&quot;&gt;&lt;b&gt;同一个 EMS 应用&lt;/b&gt;&lt;br&gt;机组列表 · 功率统计 · 告警 · 启停 · 微网调度&lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;scene&quot;&gt;
      &lt;div class=&quot;headline&quot;&gt;&lt;b&gt;旧方式：同一种业务信息，被包装成三套厂家接口&lt;/b&gt;&lt;span&gt;项目团队先要理解每套私有表达&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;inputs&quot;&gt;
        &lt;div class=&quot;input-col&quot;&gt;&lt;b&gt;A 厂&lt;/b&gt;&lt;code&gt;40035 = 8500&lt;/code&gt;&lt;code&gt;× 0.1 kW&lt;/code&gt;&lt;code&gt;00025 = 启动&lt;/code&gt;&lt;/div&gt;
        &lt;div class=&quot;input-col&quot;&gt;&lt;b&gt;B 厂&lt;/b&gt;&lt;code&gt;ACT_PWR = 850&lt;/code&gt;&lt;code&gt;unit = kW&lt;/code&gt;&lt;code&gt;CMD_07 = 启动&lt;/code&gt;&lt;/div&gt;
        &lt;div class=&quot;input-col&quot;&gt;&lt;b&gt;C 厂&lt;/b&gt;&lt;code&gt;31008 = 0.85&lt;/code&gt;&lt;code&gt;unit = MW&lt;/code&gt;&lt;code&gt;DO_12 = 启动&lt;/code&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;warn&quot;&gt;地址、名字、单位、缩放、状态码和控制流程都可能不同。&lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;scene&quot;&gt;
      &lt;div class=&quot;headline&quot;&gt;&lt;b&gt;于是项目团队为每台设备编写一套“翻译器”&lt;/b&gt;&lt;span&gt;这些工作不是业务功能，却在每个项目里重复发生&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;adapter-list&quot;&gt;
        &lt;div class=&quot;adapter-row&quot;&gt;&lt;div class=&quot;vendor&quot;&gt;A 厂&lt;/div&gt;&lt;div class=&quot;code-task&quot; style=&quot;--n:1&quot;&gt;协议驱动&lt;small&gt;读寄存器&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;code-task&quot; style=&quot;--n:2&quot;&gt;数值换算&lt;small&gt;× 0.1&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;code-task&quot; style=&quot;--n:3&quot;&gt;语义映射&lt;small&gt;40035→功率&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;code-task&quot; style=&quot;--n:4&quot;&gt;控制适配&lt;small&gt;启动时序&lt;/small&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;adapter-row&quot;&gt;&lt;div class=&quot;vendor&quot;&gt;B 厂&lt;/div&gt;&lt;div class=&quot;code-task&quot; style=&quot;--n:2&quot;&gt;协议驱动&lt;small&gt;厂家 API&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;code-task&quot; style=&quot;--n:3&quot;&gt;类型转换&lt;small&gt;整数→浮点&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;code-task&quot; style=&quot;--n:4&quot;&gt;语义映射&lt;small&gt;ACT_PWR→功率&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;code-task&quot; style=&quot;--n:5&quot;&gt;控制适配&lt;small&gt;命令确认&lt;/small&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;adapter-row&quot;&gt;&lt;div class=&quot;vendor&quot;&gt;C 厂&lt;/div&gt;&lt;div class=&quot;code-task&quot; style=&quot;--n:3&quot;&gt;协议驱动&lt;small&gt;私有规约&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;code-task&quot; style=&quot;--n:4&quot;&gt;单位换算&lt;small&gt;MW→kW&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;code-task&quot; style=&quot;--n:5&quot;&gt;语义映射&lt;small&gt;31008→功率&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;code-task&quot; style=&quot;--n:6&quot;&gt;控制适配&lt;small&gt;脉冲输出&lt;/small&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sum&quot;&gt;3 个厂家 = 3 套驱动、3 套映射、3 套测试和维护逻辑。&lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;scene&quot;&gt;
      &lt;div class=&quot;headline&quot;&gt;&lt;b&gt;设备一更换，差异会向上层层扩散&lt;/b&gt;&lt;span&gt;A厂机组换成D厂，不只是改一个通信地址&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;ripple&quot;&gt;
        &lt;div class=&quot;change&quot;&gt;&lt;b&gt;A厂 → D厂&lt;/b&gt;&lt;br&gt;&lt;br&gt;协议、点表和控制流程变化&lt;/div&gt;
        &lt;div class=&quot;impact&quot; style=&quot;--n:1&quot;&gt;重写或修改通信驱动&lt;/div&gt;
        &lt;div class=&quot;impact&quot; style=&quot;--n:2&quot;&gt;重新做地址、单位和缩放映射&lt;/div&gt;
        &lt;div class=&quot;impact&quot; style=&quot;--n:3&quot;&gt;修改EMS数据库与告警定义&lt;/div&gt;
        &lt;div class=&quot;impact&quot; style=&quot;--n:4&quot;&gt;重新验证启动、停机与反馈流程&lt;/div&gt;
        &lt;div class=&quot;impact&quot; style=&quot;--n:5&quot;&gt;重新联调画面、报表和调度应用&lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;scene&quot;&gt;
      &lt;div class=&quot;headline&quot;&gt;&lt;b&gt;61850的改变：把“翻译工作”移到设备产品边界&lt;/b&gt;&lt;span&gt;厂家最了解内部数据，因此由厂家一次性映射为标准对象&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;boundary&quot;&gt;
        &lt;div class=&quot;inside&quot;&gt;&lt;span&gt;40035 = 8500&lt;/span&gt;&lt;span&gt;厂家告警码 17&lt;/span&gt;&lt;span&gt;厂家启动程序&lt;/span&gt;&lt;span&gt;内部寄存器与算法&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;map-arrow&quot;&gt;&lt;b&gt;厂家产品适配&lt;/b&gt;&lt;i data-lucide=&quot;arrow-right&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;br&gt;做一次模型映射&lt;/div&gt;
        &lt;div class=&quot;facade&quot;&gt;
          &lt;span style=&quot;--n:1&quot;&gt;总有功功率 &lt;code&gt;MMXU1.TotW = 850 kW&lt;/code&gt;&lt;/span&gt;
          &lt;span style=&quot;--n:2&quot;&gt;频率 &lt;code&gt;MMXU1.Hz = 50.00 Hz&lt;/code&gt;&lt;/span&gt;
          &lt;span style=&quot;--n:3&quot;&gt;出口开关 &lt;code&gt;XCBR1.Pos = on&lt;/code&gt;&lt;/span&gt;
          &lt;span style=&quot;--n:4&quot;&gt;数据上下文 &lt;code&gt;value + unit + q + t&lt;/code&gt;&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;owner&quot;&gt;厂家负责“内部数据如何变成标准对象”；项目不再重复解析厂家寄存器。&lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;scene&quot;&gt;
      &lt;div class=&quot;headline&quot;&gt;&lt;b&gt;项目阶段从“写代码”变成“导入、选择和连接”&lt;/b&gt;&lt;span&gt;工程配置决定这台机组在本项目里如何被使用&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;engineering&quot;&gt;
        &lt;div class=&quot;file&quot;&gt;&lt;i data-lucide=&quot;file-code-2&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;b&gt;导入 ICD&lt;/b&gt;&lt;small&gt;设备支持哪些模型与服务&lt;/small&gt;&lt;/div&gt;
        &lt;i data-lucide=&quot;arrow-right&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
        &lt;div class=&quot;tool&quot;&gt;&lt;b&gt;工程工具中配置&lt;/b&gt;&lt;div class=&quot;checks&quot;&gt;&lt;span&gt;实例名：DG01&lt;/span&gt;&lt;span&gt;选择功率/频率/告警&lt;/span&gt;&lt;span&gt;建立报告与控制关系&lt;/span&gt;&lt;span&gt;配置IP和数据集&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;i data-lucide=&quot;arrow-right&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
        &lt;div class=&quot;output&quot;&gt;&lt;i data-lucide=&quot;files&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;b&gt;生成 SCD / CID&lt;/b&gt;&lt;small&gt;全系统关系与设备下装配置&lt;/small&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;no-code&quot;&gt;变化的是实例、对象选择和通信关系——主要修改配置，不修改EMS协议程序。&lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;scene&quot;&gt;
      &lt;div class=&quot;headline&quot;&gt;&lt;b&gt;运行时：三台不同机组向EMS呈现同一种业务接口&lt;/b&gt;&lt;span&gt;上层应用围绕“功率、状态、告警、控制”开发一次&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;running&quot;&gt;
        &lt;div class=&quot;fleet&quot;&gt;
          &lt;div class=&quot;machine&quot;&gt;&lt;b&gt;A 厂&lt;/b&gt;&lt;small&gt;内部实现A&lt;/small&gt;&lt;/div&gt;
          &lt;div class=&quot;machine&quot;&gt;&lt;b&gt;B 厂&lt;/b&gt;&lt;small&gt;内部实现B&lt;/small&gt;&lt;/div&gt;
          &lt;div class=&quot;machine&quot;&gt;&lt;b&gt;C 厂&lt;/b&gt;&lt;small&gt;内部实现C&lt;/small&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;standard-stream&quot;&gt;&lt;b&gt;统一模型与服务&lt;/b&gt;&lt;div class=&quot;objects&quot;&gt;&lt;code&gt;TotW&lt;/code&gt;&lt;code&gt;Hz&lt;/code&gt;&lt;code&gt;Pos&lt;/code&gt;&lt;code&gt;Report / Control&lt;/code&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;same-app&quot;&gt;&lt;b&gt;同一个 EMS 应用&lt;/b&gt;统一画面&lt;br&gt;统一报表&lt;br&gt;统一告警&lt;br&gt;统一调度逻辑&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;takeaway&quot;&gt;不是“项目完全不用工作”，而是从重复开发厂家翻译器，变成配置标准模型实例和通信关系。&lt;/div&gt;
    &lt;/section&gt;
  &lt;/div&gt;

  &lt;div class=&quot;viz-controls controls&quot;&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-action=&quot;prev&quot;&gt;&lt;i data-lucide=&quot;chevron-left&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;上一步&lt;/button&gt;
    &lt;span class=&quot;count&quot;&gt;1 / 7&lt;/span&gt;
    &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-action=&quot;next&quot;&gt;下一步&lt;i data-lucide=&quot;chevron-right&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;/button&gt;
  &lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;custom-to-config&#x27;);
      const scenes = [...root.querySelectorAll(&#x27;.scene&#x27;)];
      const tabs = [...root.querySelectorAll(&#x27;.tab&#x27;)];
      const count = root.querySelector(&#x27;.count&#x27;);
      const previous = root.querySelector(&#x27;[data-action=&quot;prev&quot;]&#x27;);
      const next = root.querySelector(&#x27;[data-action=&quot;next&quot;]&#x27;);
      let index = 0;

      function show(value) {
        const old = index;
        scenes[old].classList.remove(&#x27;active&#x27;);
        scenes[old].classList.add(&#x27;exit&#x27;);
        index = Math.max(0, Math.min(scenes.length - 1, value));
        setTimeout(() =&gt; scenes[old].classList.remove(&#x27;exit&#x27;), 380);
        scenes[index].classList.add(&#x27;active&#x27;);
        tabs.forEach((tab, i) =&gt; tab.classList.toggle(&#x27;active&#x27;, i === index));
        count.textContent = `${index + 1} / ${scenes.length}`;
        previous.disabled = index === 0;
        next.disabled = index === scenes.length - 1;
      }

      previous.addEventListener(&#x27;click&#x27;, () =&gt; show(index - 1));
      next.addEventListener(&#x27;click&#x27;, () =&gt; show(index + 1));
      previous.disabled = true;
      if (window.lucide) window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
