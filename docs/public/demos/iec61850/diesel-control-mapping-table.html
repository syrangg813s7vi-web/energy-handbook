&lt;script&gt;
  (() =&gt; {
    const root = document.getElementById(&quot;diesel-start-command-v1&quot;);
    if (!root) return;

    const steps = [
      {
        phase: &quot;业务命令&quot;,
        summary: &quot;操作员点击“启动柴发”。&quot;,
        label: &quot;人的语言&quot;,
        title: &quot;启动柴发&quot;,
        code: &quot;操作员命令：启动柴发&quot;,
        segments: [],
        nodes: [&quot;ems&quot;],
        arrows: [],
        maps: [],
        translation: false,
        feedback: false,
        states: { ems: &quot;启动柴发&quot;, gateway: &quot;等待命令&quot;, controller: &quot;等待启动&quot; }
      },
      {
        phase: &quot;标准设备模型&quot;,
        summary: &quot;命令先定位到柴发发动机的标准控制对象。&quot;,
        label: &quot;对象定位&quot;,
        title: &quot;LD_DG / DCIP1 / EngCtl&quot;,
        code: &quot;对象引用：LD_DG/DCIP1.EngCtl&quot;,
        segments: [&quot;ld&quot;, &quot;ln&quot;, &quot;do&quot;],
        nodes: [&quot;ems&quot;, &quot;gateway&quot;],
        arrows: [0],
        maps: [&quot;source&quot;],
        translation: false,
        feedback: false,
        states: { ems: &quot;选择EngCtl&quot;, gateway: &quot;找到标准对象&quot;, controller: &quot;等待启动&quot; }
      },
      {
        phase: &quot;标准控制服务&quot;,
        summary: &quot;启动被表达成对EngCtl执行Operate，控制值为on。&quot;,
        label: &quot;完整标准命令&quot;,
        title: &quot;Operate + ctlVal=on&quot;,
        code: &quot;Operate { object=LD_DG/DCIP1.EngCtl, ctlVal=on, origin=EMS, ctlNum=27, test=false }&quot;,
        segments: [&quot;ld&quot;, &quot;ln&quot;, &quot;do&quot;, &quot;service&quot;, &quot;value&quot;],
        nodes: [&quot;ems&quot;, &quot;gateway&quot;],
        arrows: [0],
        maps: [&quot;source&quot;],
        translation: false,
        feedback: false,
        states: { ems: &quot;发送Operate&quot;, gateway: &quot;收到ctlVal=on&quot;, controller: &quot;等待启动&quot; }
      },
      {
        phase: &quot;网关映射&quot;,
        summary: &quot;网关用对象引用和控制值匹配映射规则。&quot;,
        label: &quot;映射条件&quot;,
        title: &quot;EngCtl + on → 41001写1&quot;,
        code: &quot;match: LD_DG/DCIP1.EngCtl + on  ⇒  modbus-tcp, unit=3, fc=06, register=41001, value=1&quot;,
        segments: [&quot;do&quot;, &quot;value&quot;],
        nodes: [&quot;gateway&quot;],
        arrows: [],
        maps: [&quot;source&quot;, &quot;target&quot;],
        translation: true,
        feedback: false,
        states: { ems: &quot;等待执行&quot;, gateway: &quot;命中启动规则&quot;, controller: &quot;等待启动&quot; }
      },
      {
        phase: &quot;柴发操控命令&quot;,
        summary: &quot;标准命令被翻译成柴发控制器真正能执行的Modbus写寄存器命令。&quot;,
        label: &quot;厂家协议输出&quot;,
        title: &quot;Unit 3 · FC06 · 41001 = 1&quot;,
        code: &quot;Modbus TCP：设备3，功能码06，保持寄存器41001，写入值1（启动）&quot;,
        segments: [],
        nodes: [&quot;gateway&quot;, &quot;controller&quot;],
        arrows: [1],
        maps: [&quot;target&quot;],
        translation: true,
        feedback: false,
        states: { ems: &quot;等待执行&quot;, gateway: &quot;发送FC06&quot;, controller: &quot;41001=1，开始启动&quot; }
      },
      {
        phase: &quot;状态反馈&quot;,
        summary: &quot;运行状态再从厂家协议映射回标准模型，EMS确认启动成功。&quot;,
        label: &quot;闭环结果&quot;,
        title: &quot;31001=2 → EngOnOff=true&quot;,
        code: &quot;反馈：31001=2  ⇒  LD_DG/DCIP1.EngOnOff.stVal=true，q=good，t=设备时间&quot;,
        segments: [&quot;ld&quot;, &quot;ln&quot;],
        nodes: [&quot;ems&quot;, &quot;gateway&quot;, &quot;controller&quot;],
        arrows: [],
        maps: [&quot;source&quot;, &quot;target&quot;],
        translation: true,
        feedback: true,
        states: { ems: &quot;柴发状态=运行&quot;, gateway: &quot;反馈标准状态&quot;, controller: &quot;31001=2，运行&quot; }
      }
    ];

    let index = 0;
    let timer = null;
    const counter = root.querySelector(&quot;[data-start-counter]&quot;);
    const phase = root.querySelector(&quot;[data-start-phase]&quot;);
    const summary = root.querySelector(&quot;[data-start-summary]&quot;);
    const detailLabel = root.querySelector(&quot;[data-start-detail-label]&quot;);
    const detailTitle = root.querySelector(&quot;[data-start-detail-title]&quot;);
    const code = root.querySelector(&quot;[data-start-code]&quot;);
    const translation = root.querySelector(&quot;.start-translation&quot;);
    const feedback = root.querySelector(&quot;[data-start-feedback]&quot;);
    const progressbar = root.querySelector(&quot;.start-progress&quot;);
    const playButton = root.querySelector(&quot;[data-start-action=&#x27;play&#x27;]&quot;);
    const playLabel = root.querySelector(&quot;[data-start-play]&quot;);
    const arrows = root.querySelectorAll(&quot;.start-arrow&quot;);

    function render() {
      const current = steps[index];
      counter.textContent = `${index + 1} / ${steps.length}`;
      phase.textContent = current.phase;
      summary.textContent = current.summary;
      detailLabel.textContent = current.label;
      detailTitle.textContent = current.title;
      code.textContent = current.code;
      translation.classList.toggle(&quot;is-active&quot;, current.translation);
      feedback.classList.toggle(&quot;is-active&quot;, current.feedback);
      progressbar.setAttribute(&quot;aria-valuenow&quot;, String(index + 1));

      root.querySelectorAll(&quot;[data-start-segment]&quot;).forEach((segment) =&gt; {
        segment.classList.toggle(&quot;is-active&quot;, current.segments.includes(segment.dataset.startSegment));
      });

      root.querySelectorAll(&quot;[data-start-node]&quot;).forEach((node) =&gt; {
        node.classList.toggle(&quot;is-active&quot;, current.nodes.includes(node.dataset.startNode));
      });

      arrows.forEach((arrow, arrowIndex) =&gt; {
        arrow.classList.toggle(&quot;is-active&quot;, current.arrows.includes(arrowIndex));
      });

      root.querySelectorAll(&quot;[data-start-map]&quot;).forEach((item) =&gt; {
        item.classList.toggle(&quot;is-active&quot;, current.maps.includes(item.dataset.startMap));
      });

      Object.entries(current.states).forEach(([name, value]) =&gt; {
        const target = root.querySelector(`[data-start-state=&quot;${name}&quot;]`);
        if (target) target.textContent = value;
      });

      root.querySelectorAll(&quot;[data-start-progress]&quot;).forEach((item, progressIndex) =&gt; {
        item.classList.toggle(&quot;is-current&quot;, progressIndex === index);
        item.classList.toggle(&quot;is-complete&quot;, progressIndex &lt; index);
      });

      playLabel.textContent = timer ? &quot;暂停&quot; : (index === steps.length - 1 ? &quot;重新演示&quot; : &quot;开始演示&quot;);
      playButton.classList.toggle(&quot;btn-primary&quot;, !timer);
    }

    function stop() {
      if (timer) window.clearInterval(timer);
      timer = null;
      render();
    }

    function play() {
      if (timer) {
        stop();
        return;
      }
      if (index === steps.length - 1) index = 0;
      timer = window.setInterval(() =&gt; {
        if (index &gt;= steps.length - 1) {
          stop();
          return;
        }
        index += 1;
        render();
      }, 3200);
      render();
    }

    playButton.addEventListener(&quot;click&quot;, play);
    root.querySelector(&quot;[data-start-action=&#x27;prev&#x27;]&quot;).addEventListener(&quot;click&quot;, () =&gt; {
      stop();
      index = Math.max(0, index - 1);
      render();
    });
    root.querySelector(&quot;[data-start-action=&#x27;next&#x27;]&quot;).addEventListener(&quot;click&quot;, () =&gt; {
      stop();
      index = Math.min(steps.length - 1, index + 1);
      render();
    });

    render();
  })();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;

(() =&gt; {
