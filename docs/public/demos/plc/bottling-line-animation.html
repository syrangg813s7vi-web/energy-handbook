.form-range::-moz-range-track {

  background: transparent;
}

.form-range::-moz-range-thumb {

  height: 20px;

}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.btn:not(.btn-primary, .viz-tile):is(

&lt;body&gt;
&lt;div id=&quot;bottling-line-demo&quot; data-stage=&quot;0&quot; data-position=&quot;entry&quot;&gt;
  &lt;style&gt;

    #bottling-line-demo .line { fill:none; stroke:var(--border); stroke-width:3; }
    #bottling-line-demo .belt { fill:var(--muted); stroke:var(--border); stroke-width:2; }
    #bottling-line-demo .roller { fill:var(--card); stroke:var(--muted-foreground); stroke-width:2; transform-box:fill-box; transform-origin:center; }
    #bottling-line-demo.running .roller { animation:roller-turn .7s linear infinite; }
    #bottling-line-demo .station-label { fill:var(--muted-foreground); }

    #bottling-line-demo[data-position=&quot;station&quot;] .bottle-group { transform:translateX(220px); }
    #bottling-line-demo[data-position=&quot;exit&quot;] .bottle-group { transform:translateX(470px); }
    #bottling-line-demo .bottle-body { fill:var(--card); stroke:var(--foreground); stroke-width:3; }
    #bottling-line-demo .liquid { fill:color-mix(in srgb,var(--viz-series-1) 52%,transparent); transform:scaleY(0); transform-origin:center bottom; transform-box:fill-box; transition:transform 1.05s ease; }

    #bottling-line-demo .clamp-link { fill:none; stroke:var(--muted-foreground); stroke-width:5; }
    #bottling-line-demo .clamp-left { transform:translateX(-18px); transition:transform .55s ease; }
    #bottling-line-demo .clamp-right { transform:translateX(18px); transition:transform .55s ease; }
    #bottling-line-demo[data-stage=&quot;1&quot;] .clamp-left,
    #bottling-line-demo[data-stage=&quot;2&quot;] .clamp-left,
    #bottling-line-demo[data-stage=&quot;3&quot;] .clamp-left { transform:translateX(0); }
    #bottling-line-demo[data-stage=&quot;1&quot;] .clamp-right,
    #bottling-line-demo[data-stage=&quot;2&quot;] .clamp-right,
    #bottling-line-demo[data-stage=&quot;3&quot;] .clamp-right { transform:translateX(0); }
    #bottling-line-demo .nozzle { fill:var(--card); stroke:var(--muted-foreground); stroke-width:2; }
    #bottling-line-demo .stream { stroke:var(--viz-series-1); stroke-width:6; opacity:0; stroke-dasharray:8 6; }
    #bottling-line-demo[data-stage=&quot;2&quot;] .stream { opacity:1; animation:liquid-flow .45s linear infinite; }
    #bottling-line-demo .cap { fill:var(--viz-series-3); stroke:var(--foreground); stroke-width:2; opacity:0; transform:translateY(-42px); transition:transform .7s ease,opacity .2s; }
    #bottling-line-demo[data-stage=&quot;3&quot;] .cap,
    #bottling-line-demo[data-stage=&quot;4&quot;] .cap { opacity:1; transform:translateY(0); }
    #bottling-line-demo .sensor-beam { stroke:var(--viz-series-3); stroke-width:2; stroke-dasharray:4 4; opacity:.28; }
    #bottling-line-demo[data-stage=&quot;1&quot;] .sensor-beam { opacity:1; }
    #bottling-line-demo .signal-lamp { fill:var(--muted); stroke:var(--border); stroke-width:2; }
    #bottling-line-demo[data-entry-signal=&quot;true&quot;] .entry-lamp,
    #bottling-line-demo[data-exit-signal=&quot;true&quot;] .exit-lamp { fill:var(--viz-series-3); }
    #bottling-line-demo[data-entry-signal=&quot;true&quot;] .entry-beam,
    #bottling-line-demo[data-exit-signal=&quot;true&quot;] .exit-beam { opacity:1; }
    #bottling-line-demo .process { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:7px; margin:14px 0 12px; }
    #bottling-line-demo .step { min-width:0; padding:8px 5px; text-align:center; border-top:3px solid var(--border); color:var(--muted-foreground); }
    #bottling-line-demo .step b { display:block; font-weight:500; }

    #bottling-line-demo .viz-controls { justify-content:center; }

    @media (max-width:520px) {

  &lt;div class=&quot;process&quot; aria-label=&quot;灌装线五个工序&quot;&gt;
    &lt;div class=&quot;step active&quot; data-process-step=&quot;0&quot;&gt;&lt;b&gt;X0 等待&lt;/b&gt;&lt;span&gt;输送带运行&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;step&quot; data-process-step=&quot;1&quot;&gt;&lt;b&gt;X1 夹紧&lt;/b&gt;&lt;span&gt;夹具闭合&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;step&quot; data-process-step=&quot;2&quot;&gt;&lt;b&gt;X2 灌装&lt;/b&gt;&lt;span&gt;灌装阀打开&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;step&quot; data-process-step=&quot;3&quot;&gt;&lt;b&gt;X3 封盖&lt;/b&gt;&lt;span&gt;封盖机动作&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;step&quot; data-process-step=&quot;4&quot;&gt;&lt;b&gt;X4 放行&lt;/b&gt;&lt;span&gt;成品送出&lt;/span&gt;&lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;detail&quot; id=&quot;bottle-detail&quot;&gt;&lt;b&gt;空瓶进入：&lt;/b&gt;输送带把空瓶送向入口光电传感器。&lt;/div&gt;

  &lt;div class=&quot;viz-controls&quot; aria-label=&quot;动画控制&quot;&gt;
    &lt;button class=&quot;btn&quot; id=&quot;bottle-reset&quot; type=&quot;button&quot;&gt;&lt;i data-lucide=&quot;rotate-ccw&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;重新开始&lt;/button&gt;
    &lt;button class=&quot;btn&quot; id=&quot;bottle-step&quot; type=&quot;button&quot;&gt;&lt;i data-lucide=&quot;step-forward&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;单步执行&lt;/button&gt;
    &lt;button class=&quot;btn btn-primary&quot; id=&quot;bottle-auto&quot; type=&quot;button&quot;&gt;&lt;i data-lucide=&quot;play&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;自动演示&lt;/button&gt;
  &lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;bottling-line-demo&#x27;);
      const stageText = document.getElementById(&#x27;bottle-stage&#x27;);
      const outputText = document.getElementById(&#x27;bottle-output&#x27;);
      const inputText = document.getElementById(&#x27;bottle-input&#x27;);
      const detail = document.getElementById(&#x27;bottle-detail&#x27;);
      const resetButton = document.getElementById(&#x27;bottle-reset&#x27;);
      const stepButton = document.getElementById(&#x27;bottle-step&#x27;);
      const autoButton = document.getElementById(&#x27;bottle-auto&#x27;);
      const processSteps = [...root.querySelectorAll(&#x27;[data-process-step]&#x27;)];
      const stages = [
        { name:&#x27;X0 等待空瓶&#x27;, output:&#x27;输送带 = TRUE&#x27;, input:&#x27;到瓶 = FALSE&#x27;, detail:&#x27;&lt;b&gt;空瓶进入：&lt;/b&gt;输送带把空瓶送向入口光电传感器。&#x27;, running:true },
        { name:&#x27;X1 夹紧瓶子&#x27;, output:&#x27;夹具 = TRUE · 输送带 = FALSE&#x27;, input:&#x27;夹紧到位 = FALSE&#x27;, detail:&#x27;&lt;b&gt;检测到瓶：&lt;/b&gt;输送带停止，夹具闭合并固定瓶子。&#x27;, running:false },
        { name:&#x27;X2 灌装液体&#x27;, output:&#x27;夹具 = TRUE · 灌装阀 = TRUE&#x27;, input:&#x27;液位满 = FALSE&#x27;, detail:&#x27;&lt;b&gt;夹紧到位：&lt;/b&gt;保持夹紧，打开灌装阀，液位逐渐上升。&#x27;, running:false },
        { name:&#x27;X3 安装瓶盖&#x27;, output:&#x27;夹具 = TRUE · 封盖机 = TRUE&#x27;, input:&#x27;封盖完成 = FALSE&#x27;, detail:&#x27;&lt;b&gt;液位已满：&lt;/b&gt;关闭灌装阀，封盖机构落下瓶盖。&#x27;, running:false },
        { name:&#x27;X4 放行成品&#x27;, output:&#x27;输送带 = TRUE · 夹具 = FALSE&#x27;, input:&#x27;瓶离开 = FALSE&#x27;, detail:&#x27;&lt;b&gt;封盖完成：&lt;/b&gt;夹具松开，输送带把成品瓶送出工位。&#x27;, running:true }
      ];
      let stage = 0;
      let timer = null;
      let auto = false;
      let busy = false;

      function showStage(index) {
        stage = index;
        const current = stages[stage];
        root.dataset.stage = String(stage);
        if (stage !== 0) root.dataset.entrySignal = &#x27;false&#x27;;
        if (stage !== 4) root.dataset.exitSignal = &#x27;false&#x27;;
        root.classList.toggle(&#x27;running&#x27;, current.running);
        stageText.textContent = current.name;
        outputText.textContent = current.output;
        inputText.textContent = current.input;
        detail.innerHTML = current.detail;
        processSteps.forEach((el,i) =&gt; {
          el.classList.toggle(&#x27;active&#x27;, i === stage);
          el.classList.toggle(&#x27;done&#x27;, i &lt; stage);
        });
        stepButton.textContent = stage === 4 ? &#x27;完成并回到等待&#x27; : &#x27;触发下一完成信号&#x27;;
        if (window.lucide) window.lucide.createIcons({ attrs:{ width:16, height:16 } });
      }

      function finishMotion(nextDelay) {
        busy = false;
        stepButton.disabled = auto;
        resetButton.disabled = false;
        if (auto) timer = setTimeout(advance, nextDelay);
      }

      function arriveThenClamp() {
        busy = true;
        stepButton.disabled = true;
        resetButton.disabled = true;
        root.dataset.position = &#x27;station&#x27;;
        root.dataset.entrySignal = &#x27;true&#x27;;
        root.classList.add(&#x27;running&#x27;);
        inputText.textContent = &#x27;到瓶 = TRUE&#x27;;
        detail.innerHTML = &#x27;&lt;b&gt;空瓶到达：&lt;/b&gt;瓶子先移动到加工工位；检测到瓶后才停止输送带并夹紧。&#x27;;
        timer = setTimeout(() =&gt; {
          showStage(1);
          finishMotion(1500);
        }, 1100);
      }

      function releaseThenExit() {
        showStage(4);
        busy = true;
        stepButton.disabled = true;
        resetButton.disabled = true;
        timer = setTimeout(() =&gt; { root.dataset.position = &#x27;exit&#x27;; }, 250);
        timer = setTimeout(() =&gt; { root.dataset.exitSignal = &#x27;true&#x27;; inputText.textContent = &#x27;瓶离开 = TRUE&#x27;; }, 1120);
        timer = setTimeout(() =&gt; finishMotion(1700), 1300);
      }

      function advance() {
        if (busy) return;
        if (stage === 0 &amp;&amp; root.dataset.position === &#x27;entry&#x27;) {
          arriveThenClamp();
          return;
        }
        if (stage === 4) {
          root.dataset.position = &#x27;entry&#x27;;
          root.dataset.entrySignal = &#x27;false&#x27;;
          root.dataset.exitSignal = &#x27;false&#x27;;
          showStage(0);
          if (auto) stopAuto();
          return;
        }
        if (stage === 3) {
          releaseThenExit();
          return;
        }
        showStage(stage + 1);
        if (auto) timer = setTimeout(advance, 1700);
      }

      function stopAuto() {
        auto = false;
        clearTimeout(timer);
        timer = null;
        if (busy &amp;&amp; stage === 0 &amp;&amp; root.dataset.position === &#x27;station&#x27;) showStage(1);
        if (busy &amp;&amp; stage === 4) root.dataset.position = &#x27;exit&#x27;;
        busy = false;
        resetButton.disabled = false;
        autoButton.innerHTML = &#x27;&lt;i data-lucide=&quot;play&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;自动演示&#x27;;
        stepButton.disabled = false;
        if (window.lucide) window.lucide.createIcons({ attrs:{ width:16, height:16 } });
      }

      function startAuto() {
        if (auto) { stopAuto(); return; }
        if (stage === 4) { root.dataset.position = &#x27;entry&#x27;; root.dataset.exitSignal = &#x27;false&#x27;; showStage(0); }
        auto = true;
        stepButton.disabled = true;
        autoButton.innerHTML = &#x27;&lt;i data-lucide=&quot;pause&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;暂停演示&#x27;;
        if (window.lucide) window.lucide.createIcons({ attrs:{ width:16, height:16 } });
        timer = setTimeout(advance, 700);
      }

      resetButton.addEventListener(&#x27;click&#x27;, () =&gt; { stopAuto(); busy = false; root.dataset.position = &#x27;entry&#x27;; root.dataset.entrySignal = &#x27;false&#x27;; root.dataset.exitSignal = &#x27;false&#x27;; resetButton.disabled = false; stepButton.disabled = false; showStage(0); });
      stepButton.addEventListener(&#x27;click&#x27;, advance);
      autoButton.addEventListener(&#x27;click&#x27;, startAuto);
      showStage(0);
    })();
  &lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }

    }

  const handleFocusIn = (event) =&gt; {

    }

    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
