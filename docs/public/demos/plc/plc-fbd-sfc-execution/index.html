.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div id=&quot;plc-all-flow&quot;&gt;
  &lt;style&gt;
    #plc-all-flow { color:var(--foreground); font-family:inherit; padding-bottom:72px; }
    #plc-all-flow .toolbar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:10px; }
    #plc-all-flow .status { color:var(--muted-foreground); }
    #plc-all-flow .controls { position:fixed; right:18px; bottom:18px; z-index:20; display:flex; gap:8px; padding:9px; border:1px solid var(--border); border-radius:10px; background:var(--popover); color:var(--popover-foreground); box-shadow:0 8px 24px color-mix(in srgb,var(--foreground) 16%,transparent); }
    #plc-all-flow .overview { padding:15px; }
    #plc-all-flow .section-head { display:grid; grid-template-columns:auto minmax(0,1fr) auto; align-items:center; gap:10px; margin-bottom:12px; }
    #plc-all-flow .section-no { width:25px; height:25px; display:grid; place-items:center; border-radius:50%; background:var(--accent); color:var(--accent-foreground); font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
    #plc-all-flow .section-title { min-width:0; }
    #plc-all-flow .section-title strong { display:block; font-weight:500; }
    #plc-all-flow .section-title small { display:block; margin-top:2px; color:var(--muted-foreground); }
    #plc-all-flow .section-tag { color:var(--muted-foreground); white-space:nowrap; }
    #plc-all-flow .machine { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:12px; padding:12px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
    #plc-all-flow .machine-text { text-align:center; }
    #plc-all-flow .machine-text small { display:block; color:var(--muted-foreground); }
    #plc-all-flow .machine-text b { font-weight:500; }
    #plc-all-flow .bottle-zone { width:170px; height:76px; position:relative; display:flex; justify-content:center; align-items:flex-end; }
    #plc-all-flow .track { position:absolute; left:0; right:0; bottom:5px; height:3px; background:var(--border); }
    #plc-all-flow .bottle { width:34px; height:57px; border:2px solid var(--foreground); border-radius:6px 6px 9px 9px; position:relative; z-index:2; transition:transform .6s; }
    #plc-all-flow .bottle::before { content:&quot;&quot;; position:absolute; width:15px; height:8px; border:2px solid var(--foreground); border-bottom:0; left:50%; top:-10px; transform:translateX(-50%); }
    #plc-all-flow .liquid { position:absolute; left:3px; right:3px; bottom:3px; height:0; border-radius:3px 3px 5px 5px; background:color-mix(in srgb,var(--viz-series-1) 38%,transparent); transition:height .7s; }
    #plc-all-flow[data-state=&quot;2&quot;] .liquid, #plc-all-flow[data-state=&quot;3&quot;] .liquid, #plc-all-flow[data-state=&quot;4&quot;] .liquid { height:35px; }
    #plc-all-flow .cap { position:absolute; width:21px; height:5px; left:50%; top:-16px; transform:translateX(-50%); background:var(--viz-series-2); opacity:0; transition:opacity .35s; }
    #plc-all-flow[data-state=&quot;3&quot;] .cap, #plc-all-flow[data-state=&quot;4&quot;] .cap { opacity:1; }
    #plc-all-flow[data-state=&quot;0&quot;] .bottle { transform:translateX(-46px); }
    #plc-all-flow[data-state=&quot;4&quot;] .bottle { transform:translateX(48px); }
    #plc-all-flow .shared-legend { display:flex; gap:16px; flex-wrap:wrap; margin-top:12px; color:var(--muted-foreground); }
    #plc-all-flow .legend-dot { width:9px; height:9px; border-radius:50%; background:var(--border); }
    #plc-all-flow .legend-dot.blue { background:var(--viz-series-1); }
    #plc-all-flow .legend-dot.green { background:var(--viz-series-3); }
    #plc-all-flow .legend-dot.orange { background:var(--viz-series-2); }
    #plc-all-flow .compare-strip { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
    #plc-all-flow .compare-item { display:grid; grid-template-columns:auto 1fr; gap:8px; padding:9px 10px; border-left:3px solid var(--border); background:color-mix(in srgb,var(--accent) 58%,transparent); }
    #plc-all-flow .compare-item b { font-weight:500; }
    #plc-all-flow .compare-item span { color:var(--muted-foreground); }
    #plc-all-flow .compare-item.fbd { border-left-color:var(--viz-series-1); }
    #plc-all-flow .compare-item.sfc { border-left-color:var(--viz-series-2); }
    #plc-all-flow .sfc-card, #plc-all-flow .scan-card { margin-top:12px; padding:15px; }
    #plc-all-flow .scan-groups { display:grid; grid-template-columns:1.15fr 1.15fr .9fr; gap:10px; }
    #plc-all-flow .scan-group { min-width:0; }
    #plc-all-flow .scan-label { margin-bottom:6px; color:var(--muted-foreground); }
    #plc-all-flow .scan-nodes { display:flex; gap:4px; flex-wrap:wrap; }
    #plc-all-flow .scan-node { flex:1 1 38px; padding:6px 3px; border:1px solid var(--border); border-radius:5px; text-align:center; color:var(--muted-foreground); transition:background .15s,border-color .15s,color .15s; }
    #plc-all-flow .scan-node.visited { color:var(--foreground); }
    #plc-all-flow .scan-node.scanning { border-color:var(--viz-series-1); background:color-mix(in srgb,var(--viz-series-1) 16%,var(--card)); color:var(--foreground); }
    #plc-all-flow .scan-node.hit { border-color:var(--viz-series-3); background:color-mix(in srgb,var(--viz-series-3) 18%,var(--card)); color:var(--foreground); }
    #plc-all-flow .scan-pointer { margin-top:8px; color:var(--muted-foreground); }
    #plc-all-flow .panel-head { display:flex; justify-content:space-between; align-items:baseline; gap:8px; margin-bottom:12px; }
    #plc-all-flow .panel-head strong { font-weight:500; }
    #plc-all-flow .panel-head span { color:var(--muted-foreground); }
    #plc-all-flow .sfc-rail { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:8px; align-items:start; }
    #plc-all-flow .sfc-unit { min-width:0; }
    #plc-all-flow .step { min-width:0; padding:10px 5px; border:1px solid var(--border); border-radius:7px; text-align:center; background:var(--card); color:var(--muted-foreground); transition:background .3s,border-color .3s,color .3s,transform .3s; }
    #plc-all-flow .step.active { border-color:var(--viz-series-2); background:color-mix(in srgb,var(--viz-series-2) 17%,var(--card)); color:var(--foreground); transform:scale(1.04); }
    #plc-all-flow .step b { display:block; font-weight:500; }
    #plc-all-flow .step small { display:block; margin-top:4px; color:var(--muted-foreground); }
    #plc-all-flow .step.active small { color:var(--foreground); }
    #plc-all-flow .transition { min-height:34px; display:flex; justify-content:center; align-items:center; gap:5px; padding-top:5px; text-align:center; color:var(--muted-foreground); position:relative; }
    #plc-all-flow .transition::after { content:&quot;→&quot;; display:inline; }
    #plc-all-flow .transition.hot { color:var(--foreground); }
    #plc-all-flow .loopback { margin-top:8px; text-align:right; color:var(--muted-foreground); }
    #plc-all-flow .loopback.hot { color:var(--foreground); }
    #plc-all-flow .sfc-runtime { margin-top:14px; padding-top:12px; border-top:1px solid var(--border); }
    #plc-all-flow .sfc-runtime-head { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
    #plc-all-flow .sfc-runtime-head span { color:var(--muted-foreground); }
    #plc-all-flow .sfc-cycle { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
    #plc-all-flow .sfc-phase { padding:8px 6px; text-align:center; border-bottom:2px solid var(--border); color:var(--muted-foreground); transition:background .2s,border-color .2s,color .2s; }
    #plc-all-flow .sfc-phase.active { border-bottom-color:var(--viz-series-1); background:color-mix(in srgb,var(--viz-series-1) 15%,transparent); color:var(--foreground); }
    #plc-all-flow .sfc-phase.done { color:var(--foreground); }
    #plc-all-flow .sfc-phase b { display:block; font-weight:500; margin-top:3px; }
    #plc-all-flow .sfc-runtime-note { margin-top:8px; color:var(--muted-foreground); }
    #plc-all-flow .sfc-memory { margin-top:12px; padding-top:10px; border-top:1px solid var(--border); }
    #plc-all-flow .memory-head { display:flex; justify-content:space-between; gap:8px; align-items:baseline; margin-bottom:8px; }
    #plc-all-flow .memory-head strong { font-weight:500; }
    #plc-all-flow .memory-head span { color:var(--muted-foreground); }
    #plc-all-flow .memory-bits { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
    #plc-all-flow .memory-bit { padding:7px 3px; text-align:center; border-top:2px solid var(--border); color:var(--muted-foreground); }
    #plc-all-flow .memory-bit.active { border-top-color:var(--viz-series-2); background:color-mix(in srgb,var(--viz-series-2) 13%,transparent); color:var(--foreground); }
    #plc-all-flow .memory-bit b { display:block; font-weight:500; }
    #plc-all-flow .memory-details { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:8px; }
    #plc-all-flow .memory-details div { padding:7px 5px; border-bottom:1px solid var(--border); }
    #plc-all-flow .memory-details small { display:block; color:var(--muted-foreground); }
    #plc-all-flow .memory-details b { display:block; margin-top:2px; font-weight:500; overflow-wrap:anywhere; }
    #plc-all-flow .work { display:grid; grid-template-columns:1fr; gap:12px; margin-top:12px; }
    #plc-all-flow .card { min-width:0; padding:15px; }
    #plc-all-flow .fbd-map { display:grid; grid-template-columns:1fr 24px 76px 24px 1.15fr; grid-template-rows:48px 48px; gap:8px 3px; align-items:center; }
    #plc-all-flow .node { height:100%; min-width:0; display:flex; justify-content:center; align-items:center; text-align:center; padding:0 5px; border:1px solid var(--border); border-radius:6px; background:var(--card); transition:background .25s,border-color .25s; }
    #plc-all-flow .node.hot { border-color:var(--viz-series-1); background:color-mix(in srgb,var(--viz-series-1) 16%,var(--card)); }
    #plc-all-flow .state-input { grid-column:1; grid-row:1; }
    #plc-all-flow .event-input { grid-column:1; grid-row:2; }
    #plc-all-flow .and { grid-column:3; grid-row:1/3; height:76px; border-radius:50%; }
    #plc-all-flow .updates { grid-column:5; grid-row:1/3; display:grid; gap:7px; }
    #plc-all-flow .wire { height:2px; background:var(--border); position:relative; }
    #plc-all-flow .wire::after { content:&quot;&quot;; position:absolute; right:0; top:50%; width:6px; height:6px; border-top:2px solid var(--muted-foreground); border-right:2px solid var(--muted-foreground); transform:translateY(-50%) rotate(45deg); }
    #plc-all-flow .w1 { grid-column:2; grid-row:1; }
    #plc-all-flow .w2 { grid-column:2; grid-row:2; }
    #plc-all-flow .w3 { grid-column:4; grid-row:1/3; }
    #plc-all-flow .pulse { position:absolute; left:0; top:50%; width:9px; height:9px; border-radius:50%; background:var(--viz-series-1); transform:translate(-50%,-50%); opacity:0; }
    #plc-all-flow.firing .pulse { opacity:1; animation:flow-pulse .65s linear forwards; }
    #plc-all-flow.firing .w2 .pulse { animation-delay:.1s; }
    #plc-all-flow.firing .w3 .pulse { animation-delay:.6s; }
    #plc-all-flow .state-vector { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
    #plc-all-flow .bit { padding:8px 3px; text-align:center; border-top:2px solid var(--border); color:var(--muted-foreground); }
    #plc-all-flow .bit.active { border-top-color:var(--viz-series-2); color:var(--foreground); background:color-mix(in srgb,var(--viz-series-2) 10%,transparent); }
    #plc-all-flow .bit b { display:block; font-weight:500; }
    #plc-all-flow .output { margin-top:10px; padding:9px; text-align:center; background:var(--accent); color:var(--accent-foreground); border-radius:7px; }
    #plc-all-flow .explain { margin-top:12px; text-align:center; color:var(--muted-foreground); }
    #plc-all-flow .code-card { margin-top:12px; padding:15px; }
    #plc-all-flow .code-card pre { margin:0; white-space:pre-wrap; overflow-wrap:anywhere; }
    #plc-all-flow .code-card code { color:var(--foreground); }
    #plc-all-flow .code-line { display:block; padding:1px 5px; border-left:2px solid transparent; }
    #plc-all-flow .code-line.executing { border-left-color:var(--viz-series-1); background:color-mix(in srgb,var(--viz-series-1) 18%,transparent); }
    #plc-all-flow .code-line.code-hit { border-left-color:var(--viz-series-3); background:color-mix(in srgb,var(--viz-series-3) 18%,transparent); }
    #plc-all-flow .legend-item { display:inline-flex; align-items:center; gap:6px; }
    #plc-all-flow .legend-swatch { width:12px; height:8px; border-left:3px solid var(--border); background:var(--card); }
    #plc-all-flow .legend-swatch.scan { border-left-color:var(--viz-series-1); background:color-mix(in srgb,var(--viz-series-1) 18%,transparent); }
    #plc-all-flow .legend-swatch.hit { border-left-color:var(--viz-series-3); background:color-mix(in srgb,var(--viz-series-3) 18%,transparent); }
    #plc-all-flow .code-layout { display:grid; grid-template-columns:minmax(0,1.45fr) minmax(210px,.55fr); gap:18px; align-items:start; }
    #plc-all-flow .runtime-panel strong { font-weight:500; }
    #plc-all-flow .runtime-title { margin-bottom:6px; }
    #plc-all-flow .runtime-title.outputs-title { margin-top:14px; }
    #plc-all-flow .runtime-table { width:100%; border-collapse:collapse; }
    #plc-all-flow .runtime-table td { padding:6px 7px; border-bottom:1px solid var(--border); }
    #plc-all-flow .runtime-table td:last-child { text-align:right; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
    #plc-all-flow .runtime-table tr.active { background:color-mix(in srgb,var(--viz-series-2) 14%,transparent); }
    #plc-all-flow.embed-view { padding-bottom:0; }
    #plc-all-flow.embed-view .controls { display:none; }
    #plc-all-flow.embed-fbd .toolbar,
    #plc-all-flow.embed-fbd .overview,
    #plc-all-flow.embed-fbd .sfc-card,
    #plc-all-flow.embed-fbd .work,
    #plc-all-flow.embed-fbd .code-card,
    #plc-all-flow.embed-fbd .explain { display:none; }
    #plc-all-flow.embed-sfc .toolbar,
    #plc-all-flow.embed-sfc .overview,
    #plc-all-flow.embed-sfc .scan-card,
    #plc-all-flow.embed-sfc .work,
    #plc-all-flow.embed-sfc .code-card,
    #plc-all-flow.embed-sfc .explain { display:none; }
    #plc-all-flow.embed-view .scan-card,
    #plc-all-flow.embed-view .sfc-card { margin-top:0; }
    @keyframes flow-pulse { to { left:100%; } }
    @media (max-width:680px) {
      #plc-all-flow .controls { left:10px; right:10px; bottom:10px; justify-content:flex-end; }
      #plc-all-flow .machine, #plc-all-flow .work { grid-template-columns:1fr; }
      #plc-all-flow .section-head { grid-template-columns:auto minmax(0,1fr); }
      #plc-all-flow .section-tag { grid-column:2; white-space:normal; }
      #plc-all-flow .compare-strip { grid-template-columns:1fr; }
      #plc-all-flow .code-layout { grid-template-columns:1fr; }
      #plc-all-flow .scan-groups { grid-template-columns:1fr; }
      #plc-all-flow .bottle-zone { margin:auto; }
      #plc-all-flow .sfc-rail { grid-template-columns:1fr; gap:4px; }
      #plc-all-flow .sfc-cycle { grid-template-columns:1fr 1fr; }
      #plc-all-flow .memory-details { grid-template-columns:1fr 1fr; }
      #plc-all-flow .transition::after { content:&quot;↓&quot;; }
    }
    @media (prefers-reduced-motion:reduce) { #plc-all-flow .pulse { animation:none !important; } }
  &lt;/style&gt;

  &lt;div class=&quot;toolbar&quot;&gt;
    &lt;div class=&quot;status&quot; aria-live=&quot;polite&quot;&gt;工序 1/5：等待空瓶进入&lt;/div&gt;
    &lt;div class=&quot;controls&quot;&gt;
      &lt;button class=&quot;btn&quot; id=&quot;flow-reset&quot; type=&quot;button&quot;&gt;从头开始&lt;/button&gt;
      &lt;button class=&quot;btn btn-primary&quot; id=&quot;flow-next&quot; type=&quot;button&quot;&gt;继续：发送“到瓶”&lt;/button&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;section class=&quot;card overview&quot; aria-label=&quot;工艺现场与全页图例&quot;&gt;
    &lt;div class=&quot;section-head&quot;&gt;&lt;span class=&quot;section-no&quot;&gt;1&lt;/span&gt;&lt;div class=&quot;section-title&quot;&gt;&lt;strong&gt;先看现场：PLC正在控制什么&lt;/strong&gt;&lt;small&gt;同一条灌装线，下面分别用FBD和SFC解释&lt;/small&gt;&lt;/div&gt;&lt;span class=&quot;section-tag&quot;&gt;现场层&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;machine&quot;&gt;
      &lt;div class=&quot;machine-text&quot;&gt;&lt;small&gt;当前设备动作&lt;/small&gt;&lt;b id=&quot;flow-action&quot;&gt;输送带运行&lt;/b&gt;&lt;/div&gt;
      &lt;div class=&quot;bottle-zone&quot; aria-label=&quot;灌装线中的瓶子&quot;&gt;&lt;div class=&quot;track&quot;&gt;&lt;/div&gt;&lt;div class=&quot;bottle&quot;&gt;&lt;div class=&quot;cap&quot;&gt;&lt;/div&gt;&lt;div class=&quot;liquid&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;machine-text&quot;&gt;&lt;small&gt;当前等待信号&lt;/small&gt;&lt;b id=&quot;flow-event&quot;&gt;到瓶 = FALSE&lt;/b&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;compare-strip&quot; aria-label=&quot;FBD与SFC阅读提示&quot;&gt;
      &lt;div class=&quot;compare-item fbd&quot;&gt;&lt;b&gt;FBD&lt;/b&gt;&lt;span&gt;每周期从头到尾扫描全部网络&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;compare-item sfc&quot;&gt;&lt;b&gt;SFC&lt;/b&gt;&lt;span&gt;运行时记住活动步，只处理它的动作与相邻转换&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;shared-legend&quot; aria-label=&quot;全页统一颜色图例&quot;&gt;
      &lt;span class=&quot;legend-item&quot;&gt;&lt;i class=&quot;legend-dot blue&quot;&gt;&lt;/i&gt;蓝色：本周期正在执行&lt;/span&gt;
      &lt;span class=&quot;legend-item&quot;&gt;&lt;i class=&quot;legend-dot green&quot;&gt;&lt;/i&gt;绿色：条件成立或结果已生效&lt;/span&gt;
      &lt;span class=&quot;legend-item&quot;&gt;&lt;i class=&quot;legend-dot orange&quot;&gt;&lt;/i&gt;橙色：当前活动状态&lt;/span&gt;
      &lt;span class=&quot;legend-item&quot;&gt;&lt;i class=&quot;legend-dot&quot;&gt;&lt;/i&gt;灰色：未活动或本周期未命中&lt;/span&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;card scan-card&quot; aria-label=&quot;FBD每个扫描周期执行整个网络&quot;&gt;
    &lt;div class=&quot;section-head&quot;&gt;&lt;span class=&quot;section-no&quot;&gt;2&lt;/span&gt;&lt;div class=&quot;section-title&quot;&gt;&lt;strong&gt;FBD周期执行：扫描整张网络&lt;/strong&gt;&lt;small&gt;蓝色指针依次经过每个Network；绿色只标出真正产生影响的行&lt;/small&gt;&lt;/div&gt;&lt;span class=&quot;section-tag&quot;&gt;全量扫描&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;scan-groups&quot;&gt;
      &lt;div class=&quot;scan-group&quot;&gt;&lt;div class=&quot;scan-label&quot;&gt;Network 1 · 全部转换&lt;/div&gt;&lt;div class=&quot;scan-nodes&quot;&gt;
        &lt;div class=&quot;scan-node&quot; data-scan=&quot;t&quot; data-index=&quot;0&quot;&gt;T0&lt;/div&gt;&lt;div class=&quot;scan-node&quot; data-scan=&quot;t&quot; data-index=&quot;1&quot;&gt;T1&lt;/div&gt;&lt;div class=&quot;scan-node&quot; data-scan=&quot;t&quot; data-index=&quot;2&quot;&gt;T2&lt;/div&gt;&lt;div class=&quot;scan-node&quot; data-scan=&quot;t&quot; data-index=&quot;3&quot;&gt;T3&lt;/div&gt;&lt;div class=&quot;scan-node&quot; data-scan=&quot;t&quot; data-index=&quot;4&quot;&gt;T4&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;scan-group&quot;&gt;&lt;div class=&quot;scan-label&quot;&gt;Network 2 · 全部状态锁存&lt;/div&gt;&lt;div class=&quot;scan-nodes&quot;&gt;
        &lt;div class=&quot;scan-node&quot; data-scan=&quot;s&quot; data-index=&quot;0&quot;&gt;X0→X1&lt;/div&gt;&lt;div class=&quot;scan-node&quot; data-scan=&quot;s&quot; data-index=&quot;1&quot;&gt;X1→X2&lt;/div&gt;&lt;div class=&quot;scan-node&quot; data-scan=&quot;s&quot; data-index=&quot;2&quot;&gt;X2→X3&lt;/div&gt;&lt;div class=&quot;scan-node&quot; data-scan=&quot;s&quot; data-index=&quot;3&quot;&gt;X3→X4&lt;/div&gt;&lt;div class=&quot;scan-node&quot; data-scan=&quot;s&quot; data-index=&quot;4&quot;&gt;X4→X0&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;scan-group&quot;&gt;&lt;div class=&quot;scan-label&quot;&gt;Network 3 · 全部输出&lt;/div&gt;&lt;div class=&quot;scan-nodes&quot;&gt;
        &lt;div class=&quot;scan-node&quot; data-scan=&quot;o&quot; data-index=&quot;0&quot;&gt;许可&lt;/div&gt;&lt;div class=&quot;scan-node&quot; data-scan=&quot;o&quot; data-index=&quot;1&quot;&gt;输送&lt;/div&gt;&lt;div class=&quot;scan-node&quot; data-scan=&quot;o&quot; data-index=&quot;2&quot;&gt;夹具&lt;/div&gt;&lt;div class=&quot;scan-node&quot; data-scan=&quot;o&quot; data-index=&quot;3&quot;&gt;灌装&lt;/div&gt;&lt;div class=&quot;scan-node&quot; data-scan=&quot;o&quot; data-index=&quot;4&quot;&gt;封盖&lt;/div&gt;
      &lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;scan-pointer&quot; id=&quot;flow-scan-pointer&quot;&gt;等待下一次PLC扫描&lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;card sfc-card&quot; aria-label=&quot;完整SFC工艺顺序&quot;&gt;
    &lt;div class=&quot;section-head&quot;&gt;&lt;span class=&quot;section-no&quot;&gt;3&lt;/span&gt;&lt;div class=&quot;section-title&quot;&gt;&lt;strong&gt;SFC周期执行：围绕活动步运行&lt;/strong&gt;&lt;small&gt;橙色步是PLC运行时保存的当前状态；只检查它后面的转换&lt;/small&gt;&lt;/div&gt;&lt;span class=&quot;section-tag&quot;&gt;活动步驱动&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;sfc-rail&quot;&gt;
      &lt;div class=&quot;sfc-unit&quot;&gt;&lt;div class=&quot;step active&quot; data-step=&quot;0&quot;&gt;&lt;b&gt;X0 等待&lt;/b&gt;&lt;small data-step-status=&quot;0&quot;&gt;● 活动 · X0.X=TRUE&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;transition&quot; data-trans=&quot;0&quot;&gt;到瓶&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;sfc-unit&quot;&gt;&lt;div class=&quot;step&quot; data-step=&quot;1&quot;&gt;&lt;b&gt;X1 夹紧&lt;/b&gt;&lt;small data-step-status=&quot;1&quot;&gt;○ 未活动 · X1.X=FALSE&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;transition&quot; data-trans=&quot;1&quot;&gt;夹紧到位&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;sfc-unit&quot;&gt;&lt;div class=&quot;step&quot; data-step=&quot;2&quot;&gt;&lt;b&gt;X2 灌装&lt;/b&gt;&lt;small data-step-status=&quot;2&quot;&gt;○ 未活动 · X2.X=FALSE&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;transition&quot; data-trans=&quot;2&quot;&gt;液位满&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;sfc-unit&quot;&gt;&lt;div class=&quot;step&quot; data-step=&quot;3&quot;&gt;&lt;b&gt;X3 封盖&lt;/b&gt;&lt;small data-step-status=&quot;3&quot;&gt;○ 未活动 · X3.X=FALSE&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;transition&quot; data-trans=&quot;3&quot;&gt;封盖完成&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;sfc-unit&quot;&gt;&lt;div class=&quot;step&quot; data-step=&quot;4&quot;&gt;&lt;b&gt;X4 放行&lt;/b&gt;&lt;small data-step-status=&quot;4&quot;&gt;○ 未活动 · X4.X=FALSE&lt;/small&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;loopback&quot; data-trans=&quot;4&quot;&gt;↺ 瓶离开后返回 X0 等待&lt;/div&gt;
    &lt;div class=&quot;sfc-runtime&quot; aria-label=&quot;SFC单次扫描执行过程&quot;&gt;
      &lt;div class=&quot;sfc-runtime-head&quot;&gt;&lt;span id=&quot;sfc-scan-count&quot;&gt;尚未执行演示扫描&lt;/span&gt;&lt;button class=&quot;btn&quot; id=&quot;sfc-scan-once&quot; type=&quot;button&quot;&gt;执行一次SFC扫描（条件FALSE）&lt;/button&gt;&lt;/div&gt;
      &lt;div class=&quot;sfc-cycle&quot;&gt;
        &lt;div class=&quot;sfc-phase&quot; data-sfc-phase=&quot;0&quot;&gt;① 读取活动步&lt;b id=&quot;sfc-active-value&quot;&gt;X0 等待&lt;/b&gt;&lt;/div&gt;
        &lt;div class=&quot;sfc-phase&quot; data-sfc-phase=&quot;1&quot;&gt;② 执行步动作&lt;b id=&quot;sfc-action-value&quot;&gt;输送带运行&lt;/b&gt;&lt;/div&gt;
        &lt;div class=&quot;sfc-phase&quot; data-sfc-phase=&quot;2&quot;&gt;③ 检查相邻转换&lt;b id=&quot;sfc-guard-value&quot;&gt;到瓶=FALSE&lt;/b&gt;&lt;/div&gt;
        &lt;div class=&quot;sfc-phase&quot; data-sfc-phase=&quot;3&quot;&gt;④ 保存活动步&lt;b id=&quot;sfc-result-value&quot;&gt;保持X0&lt;/b&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;sfc-runtime-note&quot; id=&quot;sfc-runtime-note&quot;&gt;条件为FALSE时，下个PLC扫描周期还会再次执行X0的动作并检查“到瓶”。&lt;/div&gt;
      &lt;div class=&quot;sfc-memory&quot; aria-label=&quot;PLC维护的SFC内部状态&quot;&gt;
        &lt;div class=&quot;memory-head&quot;&gt;&lt;strong&gt;PLC内部SFC状态存储区&lt;/strong&gt;&lt;span&gt;由运行时维护，不需要用户编写SET/RESET&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;memory-bits&quot;&gt;
          &lt;div class=&quot;memory-bit active&quot; data-memory-bit=&quot;0&quot;&gt;&lt;b&gt;X0.X&lt;/b&gt;&lt;span&gt;TRUE&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;memory-bit&quot; data-memory-bit=&quot;1&quot;&gt;&lt;b&gt;X1.X&lt;/b&gt;&lt;span&gt;FALSE&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;memory-bit&quot; data-memory-bit=&quot;2&quot;&gt;&lt;b&gt;X2.X&lt;/b&gt;&lt;span&gt;FALSE&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;memory-bit&quot; data-memory-bit=&quot;3&quot;&gt;&lt;b&gt;X3.X&lt;/b&gt;&lt;span&gt;FALSE&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;memory-bit&quot; data-memory-bit=&quot;4&quot;&gt;&lt;b&gt;X4.X&lt;/b&gt;&lt;span&gt;FALSE&lt;/span&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;memory-details&quot;&gt;
          &lt;div&gt;&lt;small&gt;活动步集合&lt;/small&gt;&lt;b id=&quot;memory-active-set&quot;&gt;{X0}&lt;/b&gt;&lt;/div&gt;
          &lt;div&gt;&lt;small&gt;活动步持续时间（演示周期10ms）&lt;/small&gt;&lt;b id=&quot;memory-step-time&quot;&gt;X0.T = 0 ms&lt;/b&gt;&lt;/div&gt;
          &lt;div&gt;&lt;small&gt;允许检查的转换&lt;/small&gt;&lt;b id=&quot;memory-enabled-transition&quot;&gt;X0→X1：到瓶&lt;/b&gt;&lt;/div&gt;
          &lt;div&gt;&lt;small&gt;本周期活动动作&lt;/small&gt;&lt;b id=&quot;memory-active-action&quot;&gt;输送带运行&lt;/b&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;div class=&quot;work&quot;&gt;
    &lt;section class=&quot;card&quot; aria-label=&quot;FBD当前状态转换的显式计算&quot;&gt;
      &lt;div class=&quot;section-head&quot;&gt;&lt;span class=&quot;section-no&quot;&gt;4&lt;/span&gt;&lt;div class=&quot;section-title&quot;&gt;&lt;strong&gt;放大FBD的一次状态切换&lt;/strong&gt;&lt;small&gt;状态位与现场信号经过AND，显式复位旧状态并置位新状态&lt;/small&gt;&lt;/div&gt;&lt;span class=&quot;section-tag&quot; id=&quot;flow-tlabel&quot;&gt;当前转换 T0&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;fbd-map&quot;&gt;
        &lt;div class=&quot;node state-input&quot; id=&quot;flow-state-input&quot;&gt;X0=TRUE&lt;/div&gt;&lt;div class=&quot;wire w1&quot;&gt;&lt;i class=&quot;pulse&quot;&gt;&lt;/i&gt;&lt;/div&gt;
        &lt;div class=&quot;node event-input&quot; id=&quot;flow-event-input&quot;&gt;到瓶=FALSE&lt;/div&gt;&lt;div class=&quot;wire w2&quot;&gt;&lt;i class=&quot;pulse&quot;&gt;&lt;/i&gt;&lt;/div&gt;
        &lt;div class=&quot;node and&quot; id=&quot;flow-and&quot;&gt;AND&lt;br&gt;T0=0&lt;/div&gt;&lt;div class=&quot;wire w3&quot;&gt;&lt;i class=&quot;pulse&quot;&gt;&lt;/i&gt;&lt;/div&gt;
        &lt;div class=&quot;updates&quot;&gt;&lt;div class=&quot;node&quot; id=&quot;flow-reset-node&quot;&gt;复位X0&lt;br&gt;退出等待&lt;/div&gt;&lt;div class=&quot;node&quot; id=&quot;flow-set-node&quot;&gt;置位X1&lt;br&gt;进入夹紧&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;
  &lt;/div&gt;

  &lt;section class=&quot;card code-card&quot; aria-label=&quot;完整FBD网络等价代码&quot;&gt;
    &lt;div class=&quot;section-head&quot;&gt;&lt;span class=&quot;section-no&quot;&gt;5A&lt;/span&gt;&lt;div class=&quot;section-title&quot;&gt;&lt;strong&gt;FBD完整逻辑与实时变量&lt;/strong&gt;&lt;small&gt;左侧看整网扫描，右侧看状态BOOL和输出如何变化&lt;/small&gt;&lt;/div&gt;&lt;span class=&quot;section-tag&quot;&gt;IF等价表达&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;code-layout&quot;&gt;
      &lt;pre&gt;&lt;code&gt;// 变量
X0, X1, X2, X3, X4 : BOOL;   // 等待、夹紧、灌装、封盖、放行
T0, T1, T2, T3, T4 : BOOL;   // 状态转换条件

// Network 0：PLC首次运行时激活等待状态
IF FirstScan THEN X0 := TRUE; END_IF;

// Network 1：先计算全部转换条件，保存本扫描的判断结果
&lt;span class=&quot;code-line&quot; data-code-t=&quot;0&quot;&gt;T0 := X0 AND 到瓶;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-code-t=&quot;1&quot;&gt;T1 := X1 AND 夹紧到位;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-code-t=&quot;2&quot;&gt;T2 := X2 AND 液位满;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-code-t=&quot;3&quot;&gt;T3 := X3 AND 封盖完成;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-code-t=&quot;4&quot;&gt;T4 := X4 AND 瓶离开;&lt;/span&gt;
// Network 2：条件成立时，退出当前状态并进入下一状态
&lt;span class=&quot;code-line&quot; data-code-s=&quot;0&quot;&gt;IF T0 THEN X0 := FALSE; X1 := TRUE; END_IF;  // 等待→夹紧&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-code-s=&quot;1&quot;&gt;IF T1 THEN X1 := FALSE; X2 := TRUE; END_IF;  // 夹紧→灌装&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-code-s=&quot;2&quot;&gt;IF T2 THEN X2 := FALSE; X3 := TRUE; END_IF;  // 灌装→封盖&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-code-s=&quot;3&quot;&gt;IF T3 THEN X3 := FALSE; X4 := TRUE; END_IF;  // 封盖→放行&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-code-s=&quot;4&quot;&gt;IF T4 THEN X4 := FALSE; X0 := TRUE; END_IF;  // 放行→等待&lt;/span&gt;
// Network 3：状态位产生设备请求，再与运行许可联锁
&lt;span class=&quot;code-line&quot; data-code-o=&quot;0&quot;&gt;RunOK          := 自动模式 AND 安全允许;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-code-o=&quot;1&quot;&gt;输送带请求     := (X0 OR X4) AND RunOK;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-code-o=&quot;2&quot;&gt;夹具请求       := (X1 OR X2 OR X3) AND RunOK;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-code-o=&quot;3&quot;&gt;灌装阀请求     := X2 AND RunOK;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-code-o=&quot;4&quot;&gt;封盖机请求     := X3 AND RunOK;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
      &lt;aside class=&quot;runtime-panel&quot; aria-label=&quot;FBD变量实时状态表&quot;&gt;
        &lt;div class=&quot;runtime-title&quot;&gt;&lt;strong&gt;当前状态&lt;/strong&gt;&lt;/div&gt;
        &lt;table class=&quot;runtime-table&quot;&gt;&lt;tbody&gt;
          &lt;tr data-state-row=&quot;0&quot; class=&quot;active&quot;&gt;&lt;td&gt;X0&lt;/td&gt;&lt;td&gt;等待&lt;/td&gt;&lt;td data-state-value=&quot;0&quot;&gt;TRUE&lt;/td&gt;&lt;/tr&gt;
          &lt;tr data-state-row=&quot;1&quot;&gt;&lt;td&gt;X1&lt;/td&gt;&lt;td&gt;夹紧&lt;/td&gt;&lt;td data-state-value=&quot;1&quot;&gt;FALSE&lt;/td&gt;&lt;/tr&gt;
          &lt;tr data-state-row=&quot;2&quot;&gt;&lt;td&gt;X2&lt;/td&gt;&lt;td&gt;灌装&lt;/td&gt;&lt;td data-state-value=&quot;2&quot;&gt;FALSE&lt;/td&gt;&lt;/tr&gt;
          &lt;tr data-state-row=&quot;3&quot;&gt;&lt;td&gt;X3&lt;/td&gt;&lt;td&gt;封盖&lt;/td&gt;&lt;td data-state-value=&quot;3&quot;&gt;FALSE&lt;/td&gt;&lt;/tr&gt;
          &lt;tr data-state-row=&quot;4&quot;&gt;&lt;td&gt;X4&lt;/td&gt;&lt;td&gt;放行&lt;/td&gt;&lt;td data-state-value=&quot;4&quot;&gt;FALSE&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;&lt;/table&gt;
        &lt;div class=&quot;runtime-title outputs-title&quot;&gt;&lt;strong&gt;输出变量&lt;/strong&gt;&lt;/div&gt;
        &lt;table class=&quot;runtime-table&quot;&gt;&lt;tbody&gt;
          &lt;tr data-output-row=&quot;0&quot; class=&quot;active&quot;&gt;&lt;td colspan=&quot;2&quot;&gt;RunOK&lt;/td&gt;&lt;td id=&quot;value-run&quot;&gt;TRUE&lt;/td&gt;&lt;/tr&gt;
          &lt;tr data-output-row=&quot;1&quot; class=&quot;active&quot;&gt;&lt;td colspan=&quot;2&quot;&gt;输送带请求&lt;/td&gt;&lt;td id=&quot;value-conveyor&quot;&gt;TRUE&lt;/td&gt;&lt;/tr&gt;
          &lt;tr data-output-row=&quot;2&quot;&gt;&lt;td colspan=&quot;2&quot;&gt;夹具请求&lt;/td&gt;&lt;td id=&quot;value-clamp&quot;&gt;FALSE&lt;/td&gt;&lt;/tr&gt;
          &lt;tr data-output-row=&quot;3&quot;&gt;&lt;td colspan=&quot;2&quot;&gt;灌装阀请求&lt;/td&gt;&lt;td id=&quot;value-fill&quot;&gt;FALSE&lt;/td&gt;&lt;/tr&gt;
          &lt;tr data-output-row=&quot;4&quot;&gt;&lt;td colspan=&quot;2&quot;&gt;封盖机请求&lt;/td&gt;&lt;td id=&quot;value-cap&quot;&gt;FALSE&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;&lt;/table&gt;
      &lt;/aside&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;card code-card&quot; aria-label=&quot;完整SFC程序等价代码&quot;&gt;
    &lt;div class=&quot;section-head&quot;&gt;&lt;span class=&quot;section-no&quot;&gt;5B&lt;/span&gt;&lt;div class=&quot;section-title&quot;&gt;&lt;strong&gt;SFC完整程序与运行时状态&lt;/strong&gt;&lt;small&gt;左侧看STEP—ACTION—TRANSITION，右侧看PLC维护的活动步&lt;/small&gt;&lt;/div&gt;&lt;span class=&quot;section-tag&quot;&gt;顺序结构&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;code-layout&quot;&gt;
      &lt;pre&gt;&lt;code&gt;// 初始步用双边框表示；N表示该步激活期间每扫描执行
&lt;span class=&quot;code-line&quot; data-sfc-step-line=&quot;0&quot;&gt;INITIAL_STEP X0_等待&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-sfc-action-line=&quot;0&quot;&gt;    ACTION N: 输送带请求 := TRUE;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-sfc-transition-line=&quot;0&quot;&gt;TRANSITION X0_等待 → X1_夹紧 WHEN 到瓶;&lt;/span&gt;
&lt;span class=&quot;code-line&quot; data-sfc-step-line=&quot;1&quot;&gt;STEP X1_夹紧&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-sfc-action-line=&quot;1&quot;&gt;    ACTION N: 夹具请求 := TRUE;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-sfc-transition-line=&quot;1&quot;&gt;TRANSITION X1_夹紧 → X2_灌装 WHEN 夹紧到位;&lt;/span&gt;
&lt;span class=&quot;code-line&quot; data-sfc-step-line=&quot;2&quot;&gt;STEP X2_灌装&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-sfc-action-line=&quot;2&quot;&gt;    ACTION N: 夹具请求 := TRUE;
    ACTION N: 灌装阀请求 := TRUE;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-sfc-transition-line=&quot;2&quot;&gt;TRANSITION X2_灌装 → X3_封盖 WHEN 液位满;&lt;/span&gt;
&lt;span class=&quot;code-line&quot; data-sfc-step-line=&quot;3&quot;&gt;STEP X3_封盖&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-sfc-action-line=&quot;3&quot;&gt;    ACTION N: 夹具请求 := TRUE;
    ACTION N: 封盖机请求 := TRUE;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-sfc-transition-line=&quot;3&quot;&gt;TRANSITION X3_封盖 → X4_放行 WHEN 封盖完成;&lt;/span&gt;
&lt;span class=&quot;code-line&quot; data-sfc-step-line=&quot;4&quot;&gt;STEP X4_放行&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-sfc-action-line=&quot;4&quot;&gt;    ACTION N: 输送带请求 := TRUE;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-sfc-transition-line=&quot;4&quot;&gt;TRANSITION X4_放行 → X0_等待 WHEN 瓶离开;&lt;/span&gt;
// 公共输出联锁
物理输出 := SFC动作请求 AND 自动模式 AND 安全允许;&lt;/code&gt;&lt;/pre&gt;
      &lt;aside class=&quot;runtime-panel&quot; aria-label=&quot;SFC单次扫描实时状态&quot;&gt;
        &lt;div class=&quot;runtime-title&quot;&gt;&lt;strong&gt;SFC本周期状态&lt;/strong&gt;&lt;/div&gt;
        &lt;table class=&quot;runtime-table&quot;&gt;&lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;活动步&lt;/td&gt;&lt;td id=&quot;sfc-code-active&quot;&gt;X0 等待&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;步属性&lt;/td&gt;&lt;td id=&quot;sfc-code-x&quot;&gt;X0.X=TRUE&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;动作执行&lt;/td&gt;&lt;td id=&quot;sfc-code-action&quot;&gt;尚未执行&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;转换检查&lt;/td&gt;&lt;td id=&quot;sfc-code-guard&quot;&gt;到瓶=FALSE&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;周期结果&lt;/td&gt;&lt;td id=&quot;sfc-code-result&quot;&gt;保持X0&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;&lt;/table&gt;
      &lt;/aside&gt;
    &lt;/div&gt;
  &lt;/section&gt;
  &lt;div class=&quot;explain&quot; id=&quot;flow-explain&quot;&gt;点击按钮：FBD复位当前状态X0、置位下一状态X1；SFC自动移动活动步。&lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;plc-all-flow&#x27;);
      const ownSearch = window.location.search;
      let parentSearch = &#x27;&#x27;;
      try { parentSearch = window.parent !== window ? window.parent.location.search : &#x27;&#x27;; } catch (error) { parentSearch = &#x27;&#x27;; }
      const embedMode = new URLSearchParams(ownSearch || parentSearch).get(&#x27;embed&#x27;);
      if (embedMode === &#x27;fbd&#x27; || embedMode === &#x27;sfc&#x27;) root.classList.add(&#x27;embed-view&#x27;,`embed-${embedMode}`);
      const next = document.getElementById(&#x27;flow-next&#x27;);
      const reset = document.getElementById(&#x27;flow-reset&#x27;);
      const steps = [...root.querySelectorAll(&#x27;[data-step]&#x27;)];
      const stepStatuses = [...root.querySelectorAll(&#x27;[data-step-status]&#x27;)];
      const trans = [...root.querySelectorAll(&#x27;[data-trans]&#x27;)];
      const sfcPhases = [...root.querySelectorAll(&#x27;[data-sfc-phase]&#x27;)];
      const sfcScanOnce = document.getElementById(&#x27;sfc-scan-once&#x27;);
      const memoryBits = [...root.querySelectorAll(&#x27;[data-memory-bit]&#x27;)];
      const stateRows = [...root.querySelectorAll(&#x27;[data-state-row]&#x27;)];
      const stateValues = [...root.querySelectorAll(&#x27;[data-state-value]&#x27;)];
      const outputRows = [...root.querySelectorAll(&#x27;[data-output-row]&#x27;)];
      const codeTransitions = [...root.querySelectorAll(&#x27;[data-code-t]&#x27;)];
      const codeSwitches = [...root.querySelectorAll(&#x27;[data-code-s]&#x27;)];
      const codeOutputs = [...root.querySelectorAll(&#x27;[data-code-o]&#x27;)];
      const sfcStepLines = [...root.querySelectorAll(&#x27;[data-sfc-step-line]&#x27;)];
      const sfcActionLines = [...root.querySelectorAll(&#x27;[data-sfc-action-line]&#x27;)];
      const sfcTransitionLines = [...root.querySelectorAll(&#x27;[data-sfc-transition-line]&#x27;)];
      const sfcAllCode = [...sfcStepLines,...sfcActionLines,...sfcTransitionLines];
      const scanNodes = [...root.querySelectorAll(&#x27;[data-scan]&#x27;)];
      const names = [&#x27;等待&#x27;,&#x27;夹紧&#x27;,&#x27;灌装&#x27;,&#x27;封盖&#x27;,&#x27;放行&#x27;];
      const events = [&#x27;到瓶&#x27;,&#x27;夹紧到位&#x27;,&#x27;液位满&#x27;,&#x27;封盖完成&#x27;,&#x27;瓶离开&#x27;];
      const actions = [&#x27;输送带运行&#x27;,&#x27;夹具夹紧&#x27;,&#x27;灌装阀打开&#x27;,&#x27;封盖机动作&#x27;,&#x27;输送带放行&#x27;];
      const outputs = [&#x27;输送带 ON&#x27;,&#x27;夹具 ON&#x27;,&#x27;灌装阀 ON&#x27;,&#x27;封盖机 ON&#x27;,&#x27;输送带 ON&#x27;];
      let state = 0;
      let sfcScanCount = 0;
      let actionExecutionCount = 0;
      let stepElapsed = [0,0,0,0,0];
      let timers = [];
      function text(id,value) { document.getElementById(id).textContent = value; }
      function clearTimers() { timers.forEach(clearTimeout); timers = []; }
      function later(fn,ms) { timers.push(setTimeout(fn,ms)); }
      function updateStateTable() {
        stateRows.forEach((el,i) =&gt; el.classList.toggle(&#x27;active&#x27;,i === state));
        stateValues.forEach((el,i) =&gt; el.textContent = i === state ? &#x27;TRUE&#x27; : &#x27;FALSE&#x27;);
      }
      function outputIsTrue(index) {
        if (index === 0) return true;
        if (index === 1) return state === 0 || state === 4;
        if (index === 2) return state === 1 || state === 2 || state === 3;
        if (index === 3) return state === 2;
        return state === 3;
      }
      function updateOutput(index) {
        const ids = [&#x27;value-run&#x27;,&#x27;value-conveyor&#x27;,&#x27;value-clamp&#x27;,&#x27;value-fill&#x27;,&#x27;value-cap&#x27;];
        const isTrue = outputIsTrue(index);
        text(ids[index],isTrue ? &#x27;TRUE&#x27; : &#x27;FALSE&#x27;);
        outputRows[index].classList.toggle(&#x27;active&#x27;,isTrue);
      }
      function updateAllOutputs() {
        for (let i = 0; i &lt; 5; i += 1) updateOutput(i);
      }
      function updateSfcSteps(activeIndex) {
        steps.forEach((el,i) =&gt; el.classList.toggle(&#x27;active&#x27;,i === activeIndex));
        stepStatuses.forEach((el,i) =&gt; { el.textContent = i === activeIndex ? `● 活动 · X${i}.X=TRUE` : `○ 未活动 · X${i}.X=FALSE`; });
      }
      function updateInternalMemory(activeIndex) {
        memoryBits.forEach((el,i) =&gt; {
          el.classList.toggle(&#x27;active&#x27;,i === activeIndex);
          el.querySelector(&#x27;span&#x27;).textContent = i === activeIndex ? &#x27;TRUE&#x27; : &#x27;FALSE&#x27;;
        });
        text(&#x27;memory-active-set&#x27;,`{X${activeIndex}}`);
        text(&#x27;memory-step-time&#x27;,`X${activeIndex}.T = ${stepElapsed[activeIndex]} ms`);
        text(&#x27;memory-enabled-transition&#x27;,`X${activeIndex}→X${(activeIndex + 1) % 5}：${events[activeIndex]}`);
        text(&#x27;memory-active-action&#x27;,actions[activeIndex]);
      }
      function resetSfcRuntime() {
        sfcPhases.forEach(el =&gt; el.classList.remove(&#x27;active&#x27;,&#x27;done&#x27;));
        sfcAllCode.forEach(el =&gt; el.classList.remove(&#x27;executing&#x27;,&#x27;code-hit&#x27;));
        text(&#x27;sfc-active-value&#x27;,`X${state} ${names[state]}`);
        text(&#x27;sfc-action-value&#x27;,actions[state]);
        text(&#x27;sfc-guard-value&#x27;,`${events[state]}=FALSE`);
        text(&#x27;sfc-result-value&#x27;,`保持X${state}`);
        text(&#x27;sfc-runtime-note&#x27;,`条件为FALSE时，下个PLC扫描周期还会再次执行X${state}的动作并检查“${events[state]}”。`);
        text(&#x27;sfc-scan-count&#x27;,sfcScanCount === 0 ? &#x27;尚未执行演示扫描&#x27; : `已演示 ${sfcScanCount} 个SFC扫描周期`);
        text(&#x27;sfc-code-active&#x27;,`X${state} ${names[state]}`);
        text(&#x27;sfc-code-x&#x27;,`X${state}.X=TRUE`);
        text(&#x27;sfc-code-action&#x27;,&#x27;尚未执行&#x27;);
        text(&#x27;sfc-code-guard&#x27;,`${events[state]}=未检查`);
        text(&#x27;sfc-code-result&#x27;,`保持X${state}`);
        updateInternalMemory(state);
        sfcScanOnce.disabled = false;
      }
      function animateSfcScan(conditionTrue,fromMain,scanState) {
        const nextState = (scanState + 1) % 5;
        sfcScanCount += 1;
        actionExecutionCount += 1;
        sfcScanOnce.disabled = true;
        next.disabled = true;
        sfcPhases.forEach(el =&gt; el.classList.remove(&#x27;active&#x27;,&#x27;done&#x27;));
        sfcAllCode.forEach(el =&gt; el.classList.remove(&#x27;executing&#x27;,&#x27;code-hit&#x27;));
        text(&#x27;sfc-scan-count&#x27;,`SFC扫描周期 ${sfcScanCount}`);
        text(&#x27;sfc-active-value&#x27;,`X${scanState} ${names[scanState]}`);
        text(&#x27;sfc-action-value&#x27;,`${actions[scanState]} · 第${actionExecutionCount}次`);
        text(&#x27;sfc-guard-value&#x27;,`${events[scanState]}=${conditionTrue ? &#x27;TRUE&#x27; : &#x27;FALSE&#x27;}`);
        text(&#x27;sfc-result-value&#x27;,conditionTrue ? `切换到X${nextState}` : `保持X${scanState}`);
        text(&#x27;sfc-code-active&#x27;,`X${scanState} ${names[scanState]}`);
        text(&#x27;sfc-code-x&#x27;,`X${scanState}.X=TRUE`);
        text(&#x27;sfc-code-action&#x27;,&#x27;等待执行&#x27;);
        text(&#x27;sfc-code-guard&#x27;,`${events[scanState]}=未检查`);
        text(&#x27;sfc-code-result&#x27;,&#x27;尚未决定&#x27;);
        sfcPhases.forEach((el,i) =&gt; later(() =&gt; {
          sfcPhases.forEach(x =&gt; x.classList.remove(&#x27;active&#x27;));
          sfcAllCode.forEach(x =&gt; x.classList.remove(&#x27;executing&#x27;));
          el.classList.add(&#x27;active&#x27;);
          sfcPhases.slice(0,i).forEach(x =&gt; x.classList.add(&#x27;done&#x27;));
          if (i === 0) sfcStepLines[scanState].classList.add(&#x27;executing&#x27;);
          if (i === 1) {
            sfcActionLines[scanState].classList.add(&#x27;executing&#x27;,&#x27;code-hit&#x27;);
            text(&#x27;sfc-code-action&#x27;,`${actions[scanState]} · 第${actionExecutionCount}次`);
          }
          if (i === 2) {
            sfcTransitionLines[scanState].classList.add(&#x27;executing&#x27;);
            if (conditionTrue) sfcTransitionLines[scanState].classList.add(&#x27;code-hit&#x27;);
            text(&#x27;sfc-code-guard&#x27;,`${events[scanState]}=${conditionTrue ? &#x27;TRUE&#x27; : &#x27;FALSE&#x27;}`);
          }
          if (i === 3) {
            if (conditionTrue) {
              stepElapsed[scanState] += 10;
              stepElapsed[nextState] = 0;
              updateSfcSteps(nextState);
              updateInternalMemory(nextState);
              sfcStepLines[nextState].classList.add(&#x27;code-hit&#x27;);
              text(&#x27;sfc-code-active&#x27;,`X${nextState} ${names[nextState]}`);
              text(&#x27;sfc-code-x&#x27;,`X${nextState}.X=TRUE`);
            } else { stepElapsed[scanState] += 10; updateInternalMemory(scanState); }
            text(&#x27;sfc-code-result&#x27;,conditionTrue ? `激活X${nextState}；其ACTION尚未高亮` : `保持X${scanState}`);
            text(&#x27;sfc-runtime-note&#x27;,conditionTrue ? `转换成立：停用X${scanState}、激活X${nextState}。绿色STEP表示“已激活”，不是其ACTION已执行。` : `转换未成立：X${scanState}保持活动；下一扫描仍会重复动作和检查。`);
          }
        },i * 360));
        later(() =&gt; {
          sfcPhases.forEach(el =&gt; el.classList.remove(&#x27;active&#x27;));
          sfcPhases.forEach(el =&gt; el.classList.add(&#x27;done&#x27;));
          sfcAllCode.forEach(el =&gt; el.classList.remove(&#x27;executing&#x27;));
          if (!fromMain) { sfcScanOnce.disabled = false; next.disabled = false; }
        },1500);
      }
      function prepare() {
        root.dataset.state = state;
        root.classList.remove(&#x27;firing&#x27;);
        text(&#x27;flow-tlabel&#x27;,`当前转换 T${state}`);
        text(&#x27;flow-state-input&#x27;,`X${state}=TRUE`);
        text(&#x27;flow-event-input&#x27;,`${events[state]}=FALSE`);
        document.getElementById(&#x27;flow-and&#x27;).innerHTML = `AND&lt;br&gt;T${state}=0`;
        document.getElementById(&#x27;flow-reset-node&#x27;).innerHTML = `复位X${state}&lt;br&gt;退出${names[state]}`;
        document.getElementById(&#x27;flow-set-node&#x27;).innerHTML = `置位X${(state + 1) % 5}&lt;br&gt;进入${names[(state + 1) % 5]}`;
        [&#x27;flow-event-input&#x27;,&#x27;flow-and&#x27;,&#x27;flow-reset-node&#x27;,&#x27;flow-set-node&#x27;].forEach(id =&gt; document.getElementById(id).classList.remove(&#x27;hot&#x27;));
        text(&#x27;flow-action&#x27;,actions[state]);
        text(&#x27;flow-event&#x27;,`${events[state]} = FALSE`);
        root.querySelector(&#x27;.status&#x27;).textContent = `工序 ${state + 1}/5：${names[state]} · 等待“${events[state]}”`;
        next.textContent = `继续：发送“${events[state]}”`;
        next.disabled = false;
        updateSfcSteps(state);
        trans.forEach(el =&gt; el.classList.remove(&#x27;hot&#x27;));
        updateStateTable();
        updateAllOutputs();
        [...codeTransitions,...codeSwitches,...codeOutputs].forEach(el =&gt; el.classList.remove(&#x27;executing&#x27;,&#x27;code-hit&#x27;));
        scanNodes.forEach(el =&gt; el.classList.remove(&#x27;visited&#x27;,&#x27;scanning&#x27;,&#x27;hit&#x27;));
        text(&#x27;flow-scan-pointer&#x27;,&#x27;等待下一次PLC扫描&#x27;);
        resetSfcRuntime();
        text(&#x27;flow-explain&#x27;,`点击按钮：FBD复位当前状态X${state}、置位下一状态X${(state + 1) % 5}；SFC自动移动活动步。`);
      }
      function fire() {
        prepare();
        clearTimers(); root.classList.remove(&#x27;firing&#x27;); void root.offsetWidth; root.classList.add(&#x27;firing&#x27;); next.disabled = true;
        const oldState = state;
        animateSfcScan(true,true,oldState);
        text(&#x27;flow-event&#x27;,`${events[state]} = TRUE`); text(&#x27;flow-event-input&#x27;,`${events[state]}=TRUE`);
        document.getElementById(&#x27;flow-event-input&#x27;).classList.add(&#x27;hot&#x27;);
        trans[state].classList.add(&#x27;hot&#x27;);
        root.querySelector(&#x27;.status&#x27;).textContent = `开始一次完整FBD扫描：从T0开始`;
        scanNodes.forEach((node,i) =&gt; later(() =&gt; {
          scanNodes.forEach(el =&gt; el.classList.remove(&#x27;scanning&#x27;));
          [...codeTransitions,...codeSwitches,...codeOutputs].forEach(el =&gt; el.classList.remove(&#x27;executing&#x27;));
          node.classList.add(&#x27;visited&#x27;,&#x27;scanning&#x27;);
          const kind = node.dataset.scan;
          const index = Number(node.dataset.index);
          if ((kind === &#x27;t&#x27; || kind === &#x27;s&#x27;) &amp;&amp; index === oldState) node.classList.add(&#x27;hit&#x27;);
          const codeLine = kind === &#x27;t&#x27; ? codeTransitions[index] : kind === &#x27;s&#x27; ? codeSwitches[index] : codeOutputs[index];
          codeLine?.classList.add(&#x27;executing&#x27;);
          if ((kind === &#x27;t&#x27; || kind === &#x27;s&#x27;) &amp;&amp; index === oldState) codeLine?.classList.add(&#x27;code-hit&#x27;);
          if (kind === &#x27;t&#x27;) text(&#x27;flow-scan-pointer&#x27;,`Network 1：正在计算 T${index}（全部T0～T4都会计算）`);
          if (kind === &#x27;s&#x27;) text(&#x27;flow-scan-pointer&#x27;,`Network 2：正在执行状态锁存网络 ${index + 1}/5`);
          if (kind === &#x27;o&#x27;) {
            text(&#x27;flow-scan-pointer&#x27;,`Network 3：正在重新计算全部设备输出`);
            updateOutput(index);
            if (outputIsTrue(index)) { node.classList.add(&#x27;hit&#x27;); codeLine?.classList.add(&#x27;code-hit&#x27;); }
          }
        },i * 190));
        later(() =&gt; { document.getElementById(&#x27;flow-and&#x27;).innerHTML = `AND&lt;br&gt;T${oldState}=1`; document.getElementById(&#x27;flow-and&#x27;).classList.add(&#x27;hot&#x27;); },950);
        later(() =&gt; {
          document.getElementById(&#x27;flow-reset-node&#x27;).classList.add(&#x27;hot&#x27;); document.getElementById(&#x27;flow-set-node&#x27;).classList.add(&#x27;hot&#x27;);
          state = (oldState + 1) % 5;
          root.dataset.state = state;
          updateStateTable();
        },1900);
        later(() =&gt; {
          scanNodes.forEach(el =&gt; el.classList.remove(&#x27;scanning&#x27;));
          [...codeTransitions,...codeSwitches,...codeOutputs].forEach(el =&gt; el.classList.remove(&#x27;executing&#x27;));
          updateSfcSteps(state);
          text(&#x27;flow-action&#x27;,actions[state]);
          root.querySelector(&#x27;.status&#x27;).textContent = `整张FBD网络扫描完成：X${oldState}=FALSE，X${state}=TRUE`;
          text(&#x27;flow-scan-pointer&#x27;,&#x27;本周期已依次执行：全部转换 → 全部状态锁存 → 全部输出&#x27;);
          text(&#x27;flow-explain&#x27;,`只有T${oldState}为TRUE，但T0～T4以及后续网络都被执行了一遍。`);
          next.textContent = `继续：发送“${events[state]}”`;
          next.disabled = false;
          sfcScanOnce.disabled = false;
        },2850);
      }
      next.addEventListener(&#x27;click&#x27;,fire);
      sfcScanOnce.addEventListener(&#x27;click&#x27;,() =&gt; { clearTimers(); animateSfcScan(false,false,state); });
      reset.addEventListener(&#x27;click&#x27;,() =&gt; { clearTimers(); state = 0; sfcScanCount = 0; actionExecutionCount = 0; stepElapsed = [0,0,0,0,0]; prepare(); });
      prepare();
    })();
  &lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }

    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)

    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),

      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {

        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
