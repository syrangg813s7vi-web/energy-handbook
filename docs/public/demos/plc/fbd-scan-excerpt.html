html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div id=&quot;fbd-scan-excerpt&quot;&gt;
  &lt;style&gt;
    #fbd-scan-excerpt { color:var(--foreground); font-family:inherit; }
    #fbd-scan-excerpt .head { display:grid; grid-template-columns:auto minmax(0,1fr) auto; align-items:center; gap:10px; margin-bottom:16px; }
    #fbd-scan-excerpt .badge { width:34px; height:34px; display:grid; place-items:center; border-radius:50%; background:color-mix(in srgb,var(--viz-series-1) 15%,transparent); }
    #fbd-scan-excerpt .head b { display:block; font-weight:500; }
    #fbd-scan-excerpt .head small { display:block; margin-top:3px; color:var(--muted-foreground); }
    #fbd-scan-excerpt .head em { color:var(--muted-foreground); font-style:normal; }
    #fbd-scan-excerpt .body-grid { display:grid; grid-template-columns:minmax(0,1.45fr) minmax(230px,.55fr); gap:20px; align-items:start; }
    #fbd-scan-excerpt .code-block { margin:0; white-space:pre-wrap; overflow-wrap:anywhere; }
    #fbd-scan-excerpt .code-line { display:block; padding:2px 6px; border-left:3px solid transparent; color:var(--muted-foreground); }
    #fbd-scan-excerpt .code-line.visited { color:var(--foreground); }
    #fbd-scan-excerpt .code-line.scanning { border-left-color:var(--viz-series-1); background:color-mix(in srgb,var(--viz-series-1) 16%,transparent); color:var(--foreground); }
    #fbd-scan-excerpt .code-line.hit { border-left-color:var(--viz-series-3); background:color-mix(in srgb,var(--viz-series-3) 18%,transparent); color:var(--foreground); }
    #fbd-scan-excerpt .runtime-label { margin:0 0 6px; font-weight:500; }
    #fbd-scan-excerpt .runtime-label.outputs-label { margin-top:16px; }
    #fbd-scan-excerpt .values { display:block; }
    #fbd-scan-excerpt .value { display:grid; grid-template-columns:auto 1fr auto; gap:10px; padding:8px 7px; color:var(--muted-foreground); border-bottom:1px solid var(--border); }
    #fbd-scan-excerpt .value b { font-weight:500; }
    #fbd-scan-excerpt .value em { font-style:normal; }
    #fbd-scan-excerpt .value span { grid-column:3; overflow-wrap:anywhere; }
    #fbd-scan-excerpt .value.on { background:color-mix(in srgb,var(--viz-series-3) 13%,transparent); color:var(--foreground); }
    #fbd-scan-excerpt .footer { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:12px; flex-wrap:wrap; }
    #fbd-scan-excerpt .status { color:var(--muted-foreground); }
    @media (max-width:560px) { #fbd-scan-excerpt .body-grid { grid-template-columns:1fr; } #fbd-scan-excerpt .head { grid-template-columns:auto 1fr; } #fbd-scan-excerpt .head em { grid-column:2; } }
    @media (prefers-reduced-motion:reduce) { #fbd-scan-excerpt .code-line { transition:none; } }
  &lt;/style&gt;
  &lt;div class=&quot;head&quot;&gt;&lt;span class=&quot;badge&quot;&gt;FBD&lt;/span&gt;&lt;div&gt;&lt;b&gt;FBD完整逻辑与实时变量&lt;/b&gt;&lt;small&gt;左侧逐行扫描代码，右侧同步显示状态BOOL和输出变化&lt;/small&gt;&lt;/div&gt;&lt;em&gt;IF等价表达&lt;/em&gt;&lt;/div&gt;
  &lt;div class=&quot;body-grid&quot;&gt;&lt;pre class=&quot;code-block&quot;&gt;&lt;code&gt;// 变量
X0, X1, X2, X3, X4 : BOOL;  // 等待、夹紧、灌装、封盖、放行
T0, T1, T2, T3, T4 : BOOL;  // 状态转换条件

// Network 0 · 首次扫描激活等待状态
IF FirstScan THEN X0 := TRUE; END_IF;

// Network 1 · 计算全部转换
&lt;span class=&quot;code-line&quot; data-kind=&quot;T&quot; data-index=&quot;0&quot;&gt;T0 := X0 AND 到瓶;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-kind=&quot;T&quot; data-index=&quot;1&quot;&gt;T1 := X1 AND 夹紧到位;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-kind=&quot;T&quot; data-index=&quot;2&quot;&gt;T2 := X2 AND 液位满;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-kind=&quot;T&quot; data-index=&quot;3&quot;&gt;T3 := X3 AND 封盖完成;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-kind=&quot;T&quot; data-index=&quot;4&quot;&gt;T4 := X4 AND 瓶离开;&lt;/span&gt;// Network 2 · 更新状态BOOL
&lt;span class=&quot;code-line&quot; data-kind=&quot;X&quot; data-index=&quot;0&quot;&gt;IF T0 THEN X0:=FALSE; X1:=TRUE; END_IF;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-kind=&quot;X&quot; data-index=&quot;1&quot;&gt;IF T1 THEN X1:=FALSE; X2:=TRUE; END_IF;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-kind=&quot;X&quot; data-index=&quot;2&quot;&gt;IF T2 THEN X2:=FALSE; X3:=TRUE; END_IF;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-kind=&quot;X&quot; data-index=&quot;3&quot;&gt;IF T3 THEN X3:=FALSE; X4:=TRUE; END_IF;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-kind=&quot;X&quot; data-index=&quot;4&quot;&gt;IF T4 THEN X4:=FALSE; X0:=TRUE; END_IF;&lt;/span&gt;// Network 3 · 重新计算全部输出
&lt;span class=&quot;code-line&quot; data-kind=&quot;O&quot; data-index=&quot;0&quot;&gt;RunOK := 自动模式 AND 安全允许;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-kind=&quot;O&quot; data-index=&quot;1&quot;&gt;输送带请求 := (X0 OR X4) AND RunOK;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-kind=&quot;O&quot; data-index=&quot;2&quot;&gt;夹具请求 := (X1 OR X2 OR X3) AND RunOK;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-kind=&quot;O&quot; data-index=&quot;3&quot;&gt;灌装阀请求 := X2 AND RunOK;&lt;/span&gt;&lt;span class=&quot;code-line&quot; data-kind=&quot;O&quot; data-index=&quot;4&quot;&gt;封盖机请求 := X3 AND RunOK;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
  &lt;aside class=&quot;runtime&quot; aria-label=&quot;FBD状态变量和输出变量&quot;&gt;
    &lt;div class=&quot;runtime-label&quot;&gt;当前状态&lt;/div&gt;&lt;div class=&quot;values&quot;&gt;
      &lt;div class=&quot;value on&quot; data-state-value=&quot;0&quot;&gt;&lt;b&gt;X0&lt;/b&gt;&lt;em&gt;等待&lt;/em&gt;&lt;span&gt;TRUE&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;value&quot; data-state-value=&quot;1&quot;&gt;&lt;b&gt;X1&lt;/b&gt;&lt;em&gt;夹紧&lt;/em&gt;&lt;span&gt;FALSE&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;value&quot; data-state-value=&quot;2&quot;&gt;&lt;b&gt;X2&lt;/b&gt;&lt;em&gt;灌装&lt;/em&gt;&lt;span&gt;FALSE&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;value&quot; data-state-value=&quot;3&quot;&gt;&lt;b&gt;X3&lt;/b&gt;&lt;em&gt;封盖&lt;/em&gt;&lt;span&gt;FALSE&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;value&quot; data-state-value=&quot;4&quot;&gt;&lt;b&gt;X4&lt;/b&gt;&lt;em&gt;放行&lt;/em&gt;&lt;span&gt;FALSE&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;runtime-label outputs-label&quot;&gt;输出变量&lt;/div&gt;&lt;div class=&quot;values&quot;&gt;
      &lt;div class=&quot;value on&quot; data-output-value=&quot;0&quot;&gt;&lt;b&gt;RunOK&lt;/b&gt;&lt;span&gt;TRUE&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;value on&quot; data-output-value=&quot;1&quot;&gt;&lt;b&gt;输送带&lt;/b&gt;&lt;span&gt;TRUE&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;value&quot; data-output-value=&quot;2&quot;&gt;&lt;b&gt;夹具&lt;/b&gt;&lt;span&gt;FALSE&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;value&quot; data-output-value=&quot;3&quot;&gt;&lt;b&gt;灌装阀&lt;/b&gt;&lt;span&gt;FALSE&lt;/span&gt;&lt;/div&gt;&lt;div class=&quot;value&quot; data-output-value=&quot;4&quot;&gt;&lt;b&gt;封盖机&lt;/b&gt;&lt;span&gt;FALSE&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/aside&gt;&lt;/div&gt;
  &lt;div class=&quot;footer&quot;&gt;&lt;span class=&quot;status&quot; aria-live=&quot;polite&quot;&gt;当前X0=TRUE；等待“到瓶”&lt;/span&gt;&lt;button class=&quot;btn btn-primary&quot; type=&quot;button&quot; id=&quot;fbd-run-scan&quot;&gt;发送“到瓶”并扫描&lt;/button&gt;&lt;/div&gt;
  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;fbd-scan-excerpt&#x27;);
      const nodes = [...root.querySelectorAll(&#x27;.code-line&#x27;)];
      const status = root.querySelector(&#x27;.status&#x27;);
      const button = document.getElementById(&#x27;fbd-run-scan&#x27;);
      const stateValues = [...root.querySelectorAll(&#x27;[data-state-value]&#x27;)];
      const outputValues = [...root.querySelectorAll(&#x27;[data-output-value]&#x27;)];
      const names = [&#x27;等待&#x27;,&#x27;夹紧&#x27;,&#x27;灌装&#x27;,&#x27;封盖&#x27;,&#x27;放行&#x27;];
      const guards = [&#x27;到瓶&#x27;,&#x27;夹紧到位&#x27;,&#x27;液位满&#x27;,&#x27;封盖完成&#x27;,&#x27;瓶离开&#x27;];
      const outputMatrix = [[true,true,false,false,false],[true,false,true,false,false],[true,false,true,true,false],[true,false,true,false,true],[true,true,false,false,false]];
      let active = 0;
      let timers = [];
      function setValue(el,on) { el.classList.toggle(&#x27;on&#x27;,on); el.querySelector(&#x27;span&#x27;).textContent = on ? &#x27;TRUE&#x27; : &#x27;FALSE&#x27;; }
      function showState(index) { stateValues.forEach((el,i) =&gt; setValue(el,i === index)); outputMatrix[index].forEach((on,i) =&gt; setValue(outputValues[i],on)); }
      button.addEventListener(&#x27;click&#x27;, () =&gt; {
        timers.forEach(clearTimeout); timers = [];
        nodes.forEach(n =&gt; n.classList.remove(&#x27;visited&#x27;,&#x27;scanning&#x27;,&#x27;hit&#x27;));
        const from = active;
        const nextState = (from + 1) % 5;
        showState(from);
        button.disabled = true;
        nodes.forEach((node,index) =&gt; timers.push(setTimeout(() =&gt; {
          nodes.forEach(n =&gt; n.classList.remove(&#x27;scanning&#x27;));
          node.classList.add(&#x27;visited&#x27;,&#x27;scanning&#x27;);
          const local = Number(node.dataset.index);
          if ((node.dataset.kind === &#x27;T&#x27; || node.dataset.kind === &#x27;X&#x27;) &amp;&amp; local === from) node.classList.add(&#x27;hit&#x27;);
          if (node.dataset.kind === &#x27;O&#x27; &amp;&amp; outputMatrix[nextState][local]) node.classList.add(&#x27;hit&#x27;);
          if (node.dataset.kind === &#x27;X&#x27; &amp;&amp; local === from) {
            active = nextState;
            stateValues.forEach((el,i) =&gt; setValue(el,i === active));
          }
          if (node.dataset.kind === &#x27;O&#x27;) {
            setValue(outputValues[local],outputMatrix[nextState][local]);
          }
          status.textContent = node.dataset.kind === &#x27;T&#x27; ? `正在计算T${local}：T0～T4都会计算` : node.dataset.kind === &#x27;X&#x27; ? `正在扫描状态切换${local + 1}/5` : `正在重新计算输出${local + 1}/5`;
        }, index * 170)));
        timers.push(setTimeout(() =&gt; {
          nodes.forEach(n =&gt; n.classList.remove(&#x27;scanning&#x27;));
          status.textContent = `扫描完成：X${from}→FALSE，X${nextState}→TRUE；进入“${names[nextState]}”`;
          button.textContent = `发送“${guards[nextState]}”并扫描`;
          button.disabled = false;
        }, nodes.length * 170 + 80));
      });
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;

(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
