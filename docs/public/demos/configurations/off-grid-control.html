<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./visualize.css">
<div id="off-grid-control-demo">
  <div class="viz-controls" aria-label="动画控制">
    <button type="button" class="btn btn-primary" data-action="play">自动演示</button>
    <button type="button" class="btn" data-action="next">下一步</button>
    <button type="button" class="btn btn-ghost" data-action="reset">复位</button>
    <span class="viz-badge" data-role="step-label">步骤 1 / 7</span>
  </div>

  <div class="viz-grid island-metrics" aria-live="polite">
    <section class="card viz-stat">
      <span class="text-muted">母线频率</span>
      <strong class="viz-stat-value" data-role="frequency">50.0 Hz</strong>
    </section>
    <section class="card viz-stat">
      <span class="text-muted">母线电压</span>
      <strong class="viz-stat-value" data-role="voltage">400 V</strong>
    </section>
    <section class="card viz-stat">
      <span class="text-muted">电压 / 频率参考</span>
      <strong class="viz-stat-value" data-role="leader">外部电网</strong>
    </section>
  </div>

  <div class="island-stage" data-role="stage">
    <svg class="island-wires" viewBox="0 0 736 340" role="img" aria-labelledby="ogc-title ogc-desc">
      <title id="ogc-title">微电网由并网运行切换到离网运行</title>
      <desc id="ogc-desc">公共电网通过并网开关连接本地交流母线；离网后，构网型储能接管电压和频率参考，光伏跟随本地母线供电，负荷变化由一次调节、二次恢复和必要的负荷切除处理。</desc>

      <path class="wire grid-wire" data-role="grid-wire" d="M 120 170 L 160 170"></path>
      <path class="wire switch-wire" data-role="switch-wire" d="M 260 170 L 325 170"></path>
      <path class="wire load-wire active" d="M 435 170 L 616 170"></path>
      <path class="wire storage-wire" data-role="storage-wire" d="M 380 94 L 380 125"></path>
      <path class="wire pv-wire active" d="M 380 250 L 380 215"></path>

      <circle class="packet grid-packet" data-role="grid-packet" r="5">
        <animateMotion dur="1.2s" repeatCount="indefinite" path="M 120 170 L 160 170"></animateMotion>
      </circle>
      <circle class="packet switch-packet" data-role="switch-packet" r="5">
        <animateMotion dur="1.3s" repeatCount="indefinite" path="M 260 170 L 325 170"></animateMotion>
      </circle>
      <circle class="packet load-packet" r="5">
        <animateMotion dur="1.5s" repeatCount="indefinite" path="M 435 170 L 616 170"></animateMotion>
      </circle>
      <circle class="packet storage-packet" data-role="storage-packet" r="5">
        <animateMotion dur="1.1s" repeatCount="indefinite" path="M 380 94 L 380 125"></animateMotion>
      </circle>
      <circle class="packet pv-packet" r="5">
        <animateMotion dur="1.1s" repeatCount="indefinite" path="M 380 250 L 380 215"></animateMotion>
      </circle>
    </svg>

    <section class="card island-node grid-node" data-role="grid-node">
      <span class="text-muted">公共电网</span>
      <strong data-role="grid-power">购电 20 MW</strong>
      <small class="text-muted">强电压 / 频率参考</small>
    </section>

    <section class="card island-node switch-node" data-role="switch-node">
      <span class="text-muted">并网开关</span>
      <strong data-role="switch-state">闭合</strong>
      <small class="text-muted" data-role="switch-note">与电网并联</small>
    </section>

    <section class="card island-node bus-node" data-role="bus-node">
      <span class="text-muted">本地交流母线</span>
      <strong data-role="bus-status">电网定频定压</strong>
      <small class="text-muted" data-role="balance">供 60 / 需 60 MW</small>
    </section>

    <section class="card island-node storage-node" data-role="storage-node">
      <span class="text-muted">储能 / 构网源</span>
      <strong data-role="storage-power">5 MW</strong>
      <small class="text-muted" data-role="storage-mode">并网功率控制</small>
    </section>

    <section class="card island-node pv-node">
      <span class="text-muted">光伏 / 跟网源</span>
      <strong data-role="pv-power">35 MW</strong>
      <small class="text-muted">跟随本地母线</small>
    </section>

    <section class="card island-node load-node" data-role="load-node">
      <span class="text-muted">本地负荷</span>
      <strong data-role="served-load">60 MW</strong>
      <small class="text-muted" data-role="load-note">全部负荷供电</small>
    </section>
  </div>

  <div class="power-balance" aria-label="离网功率平衡">
    <span>本地供给</span>
    <div class="balance-track" aria-hidden="true">
      <i class="pv-fill" data-role="pv-fill"></i>
      <i class="storage-fill" data-role="storage-fill"></i>
    </div>
    <strong data-role="power-summary">光伏 35 + 储能 5 + 电网 20 = 负荷 60 MW</strong>
  </div>

  <div class="current-detail" role="status" aria-live="polite">
    <strong data-role="phase">并网运行</strong>
    <span data-role="detail">并网开关闭合，外部电网固定母线频率和电压；本地资源只需按照功率指令运行。</span>
  </div>

  <div class="progress-track" aria-hidden="true">
    <span data-role="progress"></span>
  </div>
</div>

<style>
  #off-grid-control-demo {
    color: var(--foreground);
  }

  #off-grid-control-demo .viz-controls {
    margin-bottom: 14px;
  }

  #off-grid-control-demo .island-metrics {
    margin-bottom: 12px;
  }

  #off-grid-control-demo .island-stage {
    position: relative;
    width: 100%;
    min-height: 340px;
    aspect-ratio: 736 / 340;
  }

  #off-grid-control-demo .island-wires {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  #off-grid-control-demo .wire {
    fill: none;
    stroke: var(--border);
    stroke-width: 2;
    transition: stroke 400ms ease, opacity 400ms ease;
  }

  #off-grid-control-demo .wire.active {
    stroke: var(--viz-series-1);
  }

  #off-grid-control-demo .wire.open {
    stroke: var(--destructive);
    stroke-dasharray: 6 5;
  }

  #off-grid-control-demo .packet {
    fill: var(--viz-series-1);
  }

  #off-grid-control-demo .grid-packet,
  #off-grid-control-demo .switch-packet,
  #off-grid-control-demo .storage-packet {
    opacity: 0;
    transition: opacity 300ms ease;
  }

  #off-grid-control-demo .packet.visible {
    opacity: 1;
  }

  #off-grid-control-demo .island-node {
    position: absolute;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    min-height: 80px;
  }

  #off-grid-control-demo .island-node strong {
    font-variant-numeric: tabular-nums;
  }

  #off-grid-control-demo .grid-node {
    top: 125px;
    left: 0;
    width: 16.3%;
  }

  #off-grid-control-demo .switch-node {
    top: 125px;
    left: 21.74%;
    width: 13.59%;
  }

  #off-grid-control-demo .bus-node {
    top: 125px;
    left: 44.16%;
    width: 14.95%;
  }

  #off-grid-control-demo .storage-node {
    top: 10px;
    left: 43.48%;
    width: 16.3%;
  }

  #off-grid-control-demo .pv-node {
    top: 250px;
    left: 43.48%;
    width: 16.3%;
  }

  #off-grid-control-demo .load-node {
    top: 125px;
    left: 83.7%;
    width: 16.3%;
  }

  #off-grid-control-demo .grid-node.inactive,
  #off-grid-control-demo .switch-node.open {
    opacity: 0.62;
  }

  #off-grid-control-demo .storage-node.leader,
  #off-grid-control-demo .bus-node.islanded {
    color: var(--foreground);
  }

  #off-grid-control-demo .load-node.shedding {
    color: var(--destructive);
  }

  #off-grid-control-demo .power-balance {
    display: grid;
    grid-template-columns: 88px minmax(180px, 1fr);
    gap: 8px 12px;
    align-items: center;
    padding: 10px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  #off-grid-control-demo .power-balance > span {
    color: var(--muted-foreground);
  }

  #off-grid-control-demo .power-balance > strong {
    grid-column: 2;
    font-variant-numeric: tabular-nums;
  }

  #off-grid-control-demo .balance-track {
    position: relative;
    display: flex;
    height: 18px;
    overflow: hidden;
    border-radius: 999px;
    background: var(--muted);
  }

  #off-grid-control-demo .balance-track i {
    display: block;
    height: 100%;
    width: 0;
    transition: width 650ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  #off-grid-control-demo .pv-fill {
    background: color-mix(in srgb, var(--viz-series-2) 55%, transparent);
  }

  #off-grid-control-demo .storage-fill {
    background: color-mix(in srgb, var(--viz-series-1) 78%, transparent);
  }

  #off-grid-control-demo .current-detail {
    display: flex;
    align-items: baseline;
    gap: 12px;
    min-height: 48px;
    padding: 12px 0;
  }

  #off-grid-control-demo .current-detail strong {
    flex: 0 0 auto;
  }

  #off-grid-control-demo .current-detail span {
    color: var(--muted-foreground);
  }

  #off-grid-control-demo .progress-track {
    height: 4px;
    overflow: hidden;
    border-radius: 999px;
    background: var(--muted);
  }

  #off-grid-control-demo .progress-track span {
    display: block;
    width: 14.286%;
    height: 100%;
    background: var(--viz-series-1);
    transition: width 450ms ease;
  }

  @media (max-width: 680px) {
    #off-grid-control-demo .island-stage {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      min-height: 0;
      aspect-ratio: auto;
    }

    #off-grid-control-demo .island-wires {
      display: none;
    }

    #off-grid-control-demo .island-node {
      position: static;
      width: auto;
      min-height: 94px;
    }

    #off-grid-control-demo .grid-node { order: 1; }
    #off-grid-control-demo .switch-node { order: 2; }
    #off-grid-control-demo .storage-node { order: 3; }
    #off-grid-control-demo .pv-node { order: 4; }
    #off-grid-control-demo .bus-node { order: 5; }
    #off-grid-control-demo .load-node { order: 6; }

    #off-grid-control-demo .power-balance {
      grid-template-columns: 1fr;
    }

    #off-grid-control-demo .power-balance > strong {
      grid-column: 1;
    }

    #off-grid-control-demo .current-detail {
      align-items: flex-start;
      flex-direction: column;
      gap: 4px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    #off-grid-control-demo .packet {
      display: none;
    }

    #off-grid-control-demo *,
    #off-grid-control-demo *::before,
    #off-grid-control-demo *::after {
      transition-duration: 0.001ms !important;
    }
  }
</style>

<script>
  (() => {
    const root = document.getElementById("off-grid-control-demo");
    if (!root) return;

    const states = [
      {
        phase: "并网运行",
        detail: "并网开关闭合，外部电网固定母线频率和电压；本地资源只需按照功率指令运行。",
        frequency: 50,
        voltage: 400,
        leader: "外部电网",
        switchClosed: true,
        grid: 20,
        pv: 35,
        storage: 5,
        load: 60,
        shed: 0,
        busStatus: "电网定频定压",
        storageMode: "并网功率控制",
        switchNote: "与电网并联",
      },
      {
        phase: "离网前先做功率预平衡",
        detail: "储能先把出力提高到 23 MW，使并网点交换功率从 20 MW 降到 2 MW，减少开关断开瞬间的冲击。",
        frequency: 50,
        voltage: 400,
        leader: "外部电网",
        switchClosed: true,
        grid: 2,
        pv: 35,
        storage: 23,
        load: 60,
        shed: 0,
        busStatus: "准备离网",
        storageMode: "预平衡功率",
        switchNote: "等待断开许可",
      },
      {
        phase: "并网开关断开",
        detail: "外部电网退出后，构网型储能立即接管本地母线的电压和频率参考；光伏继续跟随本地母线。",
        frequency: 49.9,
        voltage: 398,
        leader: "构网型储能",
        switchClosed: false,
        grid: 0,
        pv: 35,
        storage: 25,
        load: 60,
        shed: 0,
        busStatus: "储能建立参考",
        storageMode: "V/f 构网控制",
        switchNote: "电气隔离",
      },
      {
        phase: "离网负荷突然增加",
        detail: "负荷从 60 MW 跳到 75 MW，瞬时功率缺口使频率和电压下跌；系统不能再向外部电网求援。",
        frequency: 49.6,
        voltage: 392,
        leader: "构网型储能",
        switchClosed: false,
        grid: 0,
        pv: 35,
        storage: 40,
        load: 75,
        shed: 0,
        busStatus: "一次调节响应",
        storageMode: "下垂增功率",
        switchNote: "保持断开",
      },
      {
        phase: "一次调节稳定功率平衡",
        detail: "构网源通过 P–f 和 Q–V 调节增加有功、无功支撑，先阻止频率和电压继续下降。",
        frequency: 49.9,
        voltage: 398,
        leader: "构网型储能",
        switchClosed: false,
        grid: 0,
        pv: 35,
        storage: 40,
        load: 75,
        shed: 0,
        busStatus: "一次调节已稳定",
        storageMode: "下垂分担负荷",
        switchNote: "保持断开",
      },
      {
        phase: "二次控制恢复额定值",
        detail: "上层离网控制缓慢修正构网源参考值，把频率恢复到 50.0 Hz、电压恢复到 400 V。",
        frequency: 50,
        voltage: 400,
        leader: "构网型储能",
        switchClosed: false,
        grid: 0,
        pv: 35,
        storage: 40,
        load: 75,
        shed: 0,
        busStatus: "额定值已恢复",
        storageMode: "二次 V/f 恢复",
        switchNote: "保持断开",
      },
      {
        phase: "能力不足时切除非重要负荷",
        detail: "负荷请求达到 90 MW，但本地最多只能稳定供应 80 MW；切除 10 MW 非重要负荷，优先守住频率和电压。",
        frequency: 50,
        voltage: 400,
        leader: "构网型储能",
        switchClosed: false,
        grid: 0,
        pv: 35,
        storage: 45,
        load: 90,
        shed: 10,
        busStatus: "供需重新平衡",
        storageMode: "达到可用上限",
        switchNote: "保持断开",
      },
    ];

    const elements = {
      play: root.querySelector('[data-action="play"]'),
      frequency: root.querySelector('[data-role="frequency"]'),
      voltage: root.querySelector('[data-role="voltage"]'),
      leader: root.querySelector('[data-role="leader"]'),
      gridWire: root.querySelector('[data-role="grid-wire"]'),
      switchWire: root.querySelector('[data-role="switch-wire"]'),
      storageWire: root.querySelector('[data-role="storage-wire"]'),
      gridPacket: root.querySelector('[data-role="grid-packet"]'),
      switchPacket: root.querySelector('[data-role="switch-packet"]'),
      storagePacket: root.querySelector('[data-role="storage-packet"]'),
      gridNode: root.querySelector('[data-role="grid-node"]'),
      switchNode: root.querySelector('[data-role="switch-node"]'),
      busNode: root.querySelector('[data-role="bus-node"]'),
      storageNode: root.querySelector('[data-role="storage-node"]'),
      loadNode: root.querySelector('[data-role="load-node"]'),
      gridPower: root.querySelector('[data-role="grid-power"]'),
      switchState: root.querySelector('[data-role="switch-state"]'),
      switchNote: root.querySelector('[data-role="switch-note"]'),
      busStatus: root.querySelector('[data-role="bus-status"]'),
      balance: root.querySelector('[data-role="balance"]'),
      storagePower: root.querySelector('[data-role="storage-power"]'),
      storageMode: root.querySelector('[data-role="storage-mode"]'),
      pvPower: root.querySelector('[data-role="pv-power"]'),
      servedLoad: root.querySelector('[data-role="served-load"]'),
      loadNote: root.querySelector('[data-role="load-note"]'),
      pvFill: root.querySelector('[data-role="pv-fill"]'),
      storageFill: root.querySelector('[data-role="storage-fill"]'),
      powerSummary: root.querySelector('[data-role="power-summary"]'),
      phase: root.querySelector('[data-role="phase"]'),
      detail: root.querySelector('[data-role="detail"]'),
      stepLabel: root.querySelector('[data-role="step-label"]'),
      progress: root.querySelector('[data-role="progress"]'),
    };

    let index = 0;
    let timer = 0;

    function render() {
      const state = states[index];
      const served = state.load - state.shed;
      const localSupply = state.pv + state.storage;
      const totalSupply = localSupply + state.grid;
      const gridText = state.grid > 0 ? `购电 ${state.grid} MW` : "交换 0 MW";

      elements.frequency.textContent = `${state.frequency.toFixed(1)} Hz`;
      elements.voltage.textContent = `${state.voltage} V`;
      elements.leader.textContent = state.leader;
      elements.gridPower.textContent = gridText;
      elements.switchState.textContent = state.switchClosed ? "闭合" : "断开";
      elements.switchNote.textContent = state.switchNote;
      elements.busStatus.textContent = state.busStatus;
      elements.balance.textContent = `供 ${totalSupply} / 需 ${served} MW`;
      elements.storagePower.textContent = `${state.storage} MW`;
      elements.storageMode.textContent = state.storageMode;
      elements.pvPower.textContent = `${state.pv} MW`;
      elements.servedLoad.textContent = `${served} MW`;
      elements.loadNote.textContent = state.shed > 0 ? `已切除 ${state.shed} MW` : "全部负荷供电";
      elements.powerSummary.textContent = state.switchClosed
        ? `光伏 ${state.pv} + 储能 ${state.storage} + 电网 ${state.grid} = 负荷 ${served} MW`
        : `光伏 ${state.pv} + 储能 ${state.storage} = 已供负荷 ${served} MW`;
      elements.pvFill.style.width = `${(state.pv / 100) * 100}%`;
      elements.storageFill.style.width = `${(state.storage / 100) * 100}%`;
      elements.phase.textContent = state.phase;
      elements.detail.textContent = state.detail;
      elements.stepLabel.textContent = `步骤 ${index + 1} / ${states.length}`;
      elements.progress.style.width = `${((index + 1) / states.length) * 100}%`;

      elements.gridWire.className.baseVal = `wire grid-wire ${state.switchClosed ? "active" : "open"}`;
      elements.switchWire.className.baseVal = `wire switch-wire ${state.switchClosed ? "active" : "open"}`;
      elements.storageWire.className.baseVal = "wire storage-wire active";
      elements.gridPacket.className.baseVal = `packet grid-packet ${state.switchClosed && state.grid > 0 ? "visible" : ""}`;
      elements.switchPacket.className.baseVal = `packet switch-packet ${state.switchClosed && state.grid > 0 ? "visible" : ""}`;
      elements.storagePacket.className.baseVal = `packet storage-packet ${state.storage > 0 ? "visible" : ""}`;
      elements.gridNode.className = `card island-node grid-node ${state.switchClosed ? "" : "inactive"}`.trim();
      elements.switchNode.className = `card island-node switch-node ${state.switchClosed ? "" : "open"}`.trim();
      elements.busNode.className = `card island-node bus-node ${state.switchClosed ? "" : "islanded"}`.trim();
      elements.storageNode.className = `card island-node storage-node ${state.switchClosed ? "" : "leader"}`.trim();
      elements.loadNode.className = `card island-node load-node ${state.shed > 0 ? "shedding" : ""}`.trim();

    }

    function stop() {
      window.clearInterval(timer);
      timer = 0;
      elements.play.textContent = "自动演示";
    }

    function advance() {
      index = (index + 1) % states.length;
      render();
      if (index === states.length - 1) stop();
    }

    root.querySelector('[data-action="next"]').addEventListener("click", () => {
      stop();
      advance();
    });

    root.querySelector('[data-action="reset"]').addEventListener("click", () => {
      stop();
      index = 0;
      render();
    });

    elements.play.addEventListener("click", () => {
      if (timer) {
        stop();
        return;
      }
      if (index === states.length - 1) index = 0;
      render();
      elements.play.textContent = "暂停";
      timer = window.setInterval(advance, 2700);
    });

    render();
  })();
</script>
