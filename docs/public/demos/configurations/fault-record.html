<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./visualize.css">
<div id="fault-record-demo">
  <div class="viz-controls" aria-label="动画控制">
    <button type="button" class="btn btn-primary" data-action="play">自动演示</button>
    <button type="button" class="btn" data-action="next">下一步</button>
    <button type="button" class="btn btn-ghost" data-action="reset">复位</button>
    <span class="viz-badge" data-role="step-label">步骤 1 / 6</span>
  </div>

  <div class="viz-grid record-metrics" aria-live="polite">
    <section class="card viz-stat">
      <span class="text-muted">示例采样率</span>
      <strong class="viz-stat-value">4.8 kHz</strong>
    </section>
    <section class="card viz-stat">
      <span class="text-muted">故障前记录</span>
      <strong class="viz-stat-value">200 ms</strong>
    </section>
    <section class="card viz-stat">
      <span class="text-muted">故障后记录</span>
      <strong class="viz-stat-value">1.0 s</strong>
    </section>
  </div>

  <div class="record-stage">
    <svg class="record-wires" viewBox="0 0 736 390" role="img" aria-labelledby="fr-title fr-desc">
      <title id="fr-title">故障录波数据捕获过程</title>
      <desc id="fr-desc">电压、电流、开关量持续进入环形缓存；故障触发时保留故障前数据并继续记录故障后数据，随后生成带时间戳的事件文件供分析。</desc>

      <path class="wire sample-wire active" d="M 147 165 C 190 165 218 165 258 165"></path>
      <path class="wire trigger-wire" data-role="trigger-wire" d="M 368 110 L 368 120"></path>
      <path class="wire export-wire" data-role="export-wire" d="M 478 165 C 520 165 548 165 589 165"></path>
      <path class="wire analysis-wire" data-role="analysis-wire" d="M 662 210 C 662 232 662 245 662 260"></path>

      <circle class="packet sample-packet visible" r="5">
        <animateMotion dur="1.05s" repeatCount="indefinite" path="M 147 165 C 190 165 218 165 258 165"></animateMotion>
      </circle>
      <circle class="packet trigger-packet" data-role="trigger-packet" r="5">
        <animateMotion dur=".8s" repeatCount="indefinite" path="M 368 110 L 368 120"></animateMotion>
      </circle>
      <circle class="packet export-packet" data-role="export-packet" r="5">
        <animateMotion dur="1.1s" repeatCount="indefinite" path="M 478 165 C 520 165 548 165 589 165"></animateMotion>
      </circle>
      <circle class="packet analysis-packet" data-role="analysis-packet" r="5">
        <animateMotion dur=".95s" repeatCount="indefinite" path="M 662 210 C 662 232 662 245 662 260"></animateMotion>
      </circle>
    </svg>

    <section class="card record-node source-node">
      <span class="text-muted">实时信号</span>
      <strong>Vabc · Iabc</strong>
      <small class="text-muted">保护位 · 开关位 · 指令</small>
    </section>

    <section class="card record-node trigger-node" data-role="trigger-node">
      <span class="text-muted">触发检测</span>
      <strong data-role="trigger-status">未触发</strong>
      <small class="text-muted" data-role="trigger-note">监视越限和保护动作</small>
    </section>

    <section class="card record-node buffer-node" data-role="buffer-node">
      <span class="text-muted">环形缓存</span>
      <strong data-role="buffer-status">持续滚动写入</strong>
      <small class="text-muted" data-role="buffer-note">保留最近 200 ms</small>
    </section>

    <section class="card record-node file-node" data-role="file-node">
      <span class="text-muted">事件文件</span>
      <strong data-role="file-status">尚未生成</strong>
      <small class="text-muted" data-role="file-note">等待完整记录窗口</small>
    </section>

    <section class="card record-node analysis-node" data-role="analysis-node">
      <span class="text-muted">事后分析</span>
      <strong data-role="analysis-status">等待事件</strong>
      <small class="text-muted" data-role="analysis-note">保护行为 · 故障定位</small>
    </section>

    <div class="waveform-strip" aria-label="故障录波时间窗">
      <svg viewBox="0 0 520 92" role="img" aria-labelledby="wave-title wave-desc">
        <title id="wave-title">故障前后电流波形</title>
        <desc id="wave-desc">触发点左侧是故障前缓存，右侧是故障后记录；故障发生后电流幅值快速增大，随后保护切除。</desc>
        <path class="axis-line" d="M 8 46 L 512 46"></path>
        <path class="wave-line" data-role="wave-line" d="M 8 46 C 18 25 28 25 38 46 S 58 67 68 46 S 88 25 98 46 S 118 67 128 46 S 148 25 158 46 S 178 67 188 46 S 208 25 218 46 S 238 67 248 46"></path>
        <line class="trigger-mark" data-role="trigger-mark" x1="250" y1="8" x2="250" y2="82"></line>
        <text class="wave-label" x="205" y="88">故障前</text>
        <text class="wave-label" x="258" y="88">故障后</text>
      </svg>
    </div>
  </div>

  <div class="current-detail" role="status" aria-live="polite">
    <strong data-role="phase">持续监视</strong>
    <span data-role="detail">系统正常时也在高速采样，只是数据不断覆盖旧数据，内存中始终保留最近一小段历史。</span>
  </div>

  <div class="progress-track" aria-hidden="true">
    <span data-role="progress"></span>
  </div>
</div>

<style>
  #fault-record-demo { color: var(--foreground); }
  #fault-record-demo .viz-controls { margin-bottom: 14px; }
  #fault-record-demo .record-metrics { margin-bottom: 12px; }

  #fault-record-demo .record-stage {
    position: relative;
    width: 100%;
    min-height: 390px;
    aspect-ratio: 736 / 390;
  }

  #fault-record-demo .record-wires {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  #fault-record-demo .wire,
  #fault-record-demo .axis-line {
    fill: none;
    stroke: var(--border);
    stroke-width: 2;
    transition: stroke 400ms ease, opacity 400ms ease;
  }

  #fault-record-demo .wire.active { stroke: var(--viz-series-1); }
  #fault-record-demo .trigger-wire { stroke-dasharray: 5 5; }

  #fault-record-demo .packet {
    fill: var(--viz-series-1);
    opacity: 0;
    transition: opacity 300ms ease;
  }

  #fault-record-demo .packet.visible { opacity: 1; }

  #fault-record-demo .record-node {
    position: absolute;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    min-height: 90px;
  }

  #fault-record-demo .record-node strong { font-variant-numeric: tabular-nums; }
  #fault-record-demo .source-node { top: 120px; left: 0; width: 20%; }
  #fault-record-demo .trigger-node { top: 20px; left: 35%; width: 30%; }
  #fault-record-demo .buffer-node { top: 120px; left: 35%; width: 30%; }
  #fault-record-demo .file-node { top: 120px; left: 80%; width: 20%; }
  #fault-record-demo .analysis-node { top: 260px; left: 80%; width: 20%; }

  #fault-record-demo .record-node.active { color: var(--foreground); }
  #fault-record-demo .record-node.triggered { color: var(--destructive); }

  #fault-record-demo .waveform-strip {
    position: absolute;
    top: 260px;
    left: 0;
    width: 70%;
    height: 92px;
  }

  #fault-record-demo .waveform-strip svg { width: 100%; height: 100%; overflow: visible; }

  #fault-record-demo .wave-line {
    fill: none;
    stroke: var(--viz-series-1);
    stroke-width: 2;
    transition: d 650ms ease, opacity 300ms ease;
  }

  #fault-record-demo .trigger-mark {
    stroke: var(--destructive);
    stroke-width: 2;
    stroke-dasharray: 5 4;
    opacity: 0;
    transition: opacity 300ms ease;
  }

  #fault-record-demo .trigger-mark.visible { opacity: 1; }
  #fault-record-demo .wave-label { fill: var(--muted-foreground); text-anchor: middle; }

  #fault-record-demo .current-detail {
    display: flex;
    align-items: baseline;
    gap: 12px;
    min-height: 48px;
    padding: 12px 0;
    border-top: 1px solid var(--border);
  }

  #fault-record-demo .current-detail strong { flex: 0 0 auto; }
  #fault-record-demo .current-detail span { color: var(--muted-foreground); }

  #fault-record-demo .progress-track {
    height: 4px;
    overflow: hidden;
    border-radius: 999px;
    background: var(--muted);
  }

  #fault-record-demo .progress-track span {
    display: block;
    width: 16.667%;
    height: 100%;
    background: var(--viz-series-1);
    transition: width 450ms ease;
  }

  @media (max-width: 680px) {
    #fault-record-demo .record-stage {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      min-height: 0;
      aspect-ratio: auto;
    }

    #fault-record-demo .record-wires { display: none; }

    #fault-record-demo .record-node {
      position: static;
      width: auto;
      min-height: 94px;
    }

    #fault-record-demo .source-node { order: 1; }
    #fault-record-demo .trigger-node { order: 2; }
    #fault-record-demo .buffer-node { order: 3; }
    #fault-record-demo .file-node { order: 4; }
    #fault-record-demo .analysis-node { order: 6; }

    #fault-record-demo .waveform-strip {
      position: static;
      order: 5;
      grid-column: 1 / -1;
      width: 100%;
      height: 92px;
    }

    #fault-record-demo .current-detail {
      align-items: flex-start;
      flex-direction: column;
      gap: 4px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    #fault-record-demo .packet { display: none; }
    #fault-record-demo *,
    #fault-record-demo *::before,
    #fault-record-demo *::after { transition-duration: 0.001ms !important; }
  }
</style>

<script>
  (() => {
    const root = document.getElementById("fault-record-demo");
    if (!root) return;

    const normalWave = "M 8 46 C 18 25 28 25 38 46 S 58 67 68 46 S 88 25 98 46 S 118 67 128 46 S 148 25 158 46 S 178 67 188 46 S 208 25 218 46 S 238 67 248 46";
    const faultWave = normalWave + " C 256 5 264 5 272 46 S 288 87 296 46 S 312 5 320 46 S 336 87 344 46 S 360 5 368 46 S 384 78 392 46 S 408 20 416 46 S 432 66 440 46 S 456 32 464 46 S 480 56 488 46 S 504 42 512 46";

    const states = [
      { phase: "持续监视", detail: "系统正常时也在高速采样，只是数据不断覆盖旧数据，内存中始终保留最近一小段历史。", trigger: "未触发", triggerNote: "监视越限和保护动作", buffer: "持续滚动写入", bufferNote: "保留最近 200 ms", file: "尚未生成", fileNote: "等待完整记录窗口", analysis: "等待事件", analysisNote: "保护行为 · 故障定位", triggered: false, post: false, exported: false, analyzed: false },
      { phase: "环形缓存不断覆盖旧数据", detail: "缓存空间固定，新的样本写入后覆盖最旧样本，因此不需要无限增长的内存，也能随时回看故障前状态。", trigger: "未触发", triggerNote: "监视越限和保护动作", buffer: "写指针循环移动", bufferNote: "旧样本被新样本覆盖", file: "尚未生成", fileNote: "缓存仍可被覆盖", analysis: "等待事件", analysisNote: "尚无冻结记录", triggered: false, post: false, exported: false, analyzed: false },
      { phase: "故障条件触发", detail: "电流越限、保护启动、开关跳闸或外部命令都可以成为触发源；触发时刻被精确打上时间标签。", trigger: "过流触发 t = 0", triggerNote: "触发原因与时间已锁存", buffer: "故障前数据已冻结", bufferNote: "−200 ms 至 0 ms 保留", file: "正在等待故障后数据", fileNote: "记录窗口尚未结束", analysis: "等待完整事件", analysisNote: "暂不导出", triggered: true, post: false, exported: false, analyzed: false },
      { phase: "继续采集故障后数据", detail: "触发并不会立即停止采样，系统继续记录故障发展、保护动作和断路器切除过程，直到后触发窗口结束。", trigger: "触发已锁存", triggerNote: "不重复创建同一事件", buffer: "采集故障后 1.0 s", bufferNote: "保护位与波形同步", file: "事件即将完成", fileNote: "等待后触发计时结束", analysis: "等待完整事件", analysisNote: "暂不导出", triggered: true, post: true, exported: false, analyzed: false },
      { phase: "生成带时间戳的事件文件", detail: "录波器把通道名称、比例、采样率、触发时间、模拟量和开关量一起保存，常见交换格式是 COMTRADE。", trigger: "记录完成", triggerNote: "触发原因：过流", buffer: "窗口已冻结", bufferNote: "不再被循环覆盖", file: "COMTRADE 已生成", fileNote: "CFG / DAT 或 CFF", analysis: "文件可读取", analysisNote: "可与其他设备时间对齐", triggered: true, post: true, exported: true, analyzed: false },
      { phase: "用于事后诊断与模型校核", detail: "工程师用录波判断故障类型、保护是否正确动作、断路器切除时间和控制器响应，也可回放事件验证模型。", trigger: "事件已归档", triggerNote: "保留唯一事件编号", buffer: "恢复循环采样", bufferNote: "准备捕获下一事件", file: "记录不可变保存", fileNote: "校验时间与通道配置", analysis: "正在分析", analysisNote: "定位 · 保护 · 控制 · 回放", triggered: true, post: true, exported: true, analyzed: true },
    ];

    const el = {
      play: root.querySelector('[data-action="play"]'),
      triggerNode: root.querySelector('[data-role="trigger-node"]'), triggerStatus: root.querySelector('[data-role="trigger-status"]'), triggerNote: root.querySelector('[data-role="trigger-note"]'),
      bufferNode: root.querySelector('[data-role="buffer-node"]'), bufferStatus: root.querySelector('[data-role="buffer-status"]'), bufferNote: root.querySelector('[data-role="buffer-note"]'),
      fileNode: root.querySelector('[data-role="file-node"]'), fileStatus: root.querySelector('[data-role="file-status"]'), fileNote: root.querySelector('[data-role="file-note"]'),
      analysisNode: root.querySelector('[data-role="analysis-node"]'), analysisStatus: root.querySelector('[data-role="analysis-status"]'), analysisNote: root.querySelector('[data-role="analysis-note"]'),
      triggerWire: root.querySelector('[data-role="trigger-wire"]'), exportWire: root.querySelector('[data-role="export-wire"]'), analysisWire: root.querySelector('[data-role="analysis-wire"]'),
      triggerPacket: root.querySelector('[data-role="trigger-packet"]'), exportPacket: root.querySelector('[data-role="export-packet"]'), analysisPacket: root.querySelector('[data-role="analysis-packet"]'),
      waveLine: root.querySelector('[data-role="wave-line"]'), triggerMark: root.querySelector('[data-role="trigger-mark"]'),
      phase: root.querySelector('[data-role="phase"]'), detail: root.querySelector('[data-role="detail"]'), stepLabel: root.querySelector('[data-role="step-label"]'), progress: root.querySelector('[data-role="progress"]'),
    };

    let index = 0;
    let timer = 0;

    function render() {
      const state = states[index];
      el.triggerStatus.textContent = state.trigger;
      el.triggerNote.textContent = state.triggerNote;
      el.bufferStatus.textContent = state.buffer;
      el.bufferNote.textContent = state.bufferNote;
      el.fileStatus.textContent = state.file;
      el.fileNote.textContent = state.fileNote;
      el.analysisStatus.textContent = state.analysis;
      el.analysisNote.textContent = state.analysisNote;
      el.waveLine.setAttribute("d", state.triggered ? faultWave : normalWave);
      el.triggerMark.className.baseVal = `trigger-mark ${state.triggered ? "visible" : ""}`;
      el.triggerWire.className.baseVal = `wire trigger-wire ${state.triggered ? "active" : ""}`;
      el.exportWire.className.baseVal = `wire export-wire ${state.exported ? "active" : ""}`;
      el.analysisWire.className.baseVal = `wire analysis-wire ${state.analyzed ? "active" : ""}`;
      el.triggerPacket.className.baseVal = `packet trigger-packet ${state.triggered ? "visible" : ""}`;
      el.exportPacket.className.baseVal = `packet export-packet ${state.exported ? "visible" : ""}`;
      el.analysisPacket.className.baseVal = `packet analysis-packet ${state.analyzed ? "visible" : ""}`;
      el.triggerNode.className = `card record-node trigger-node ${state.triggered ? "triggered" : ""}`.trim();
      el.bufferNode.className = `card record-node buffer-node ${state.triggered ? "active" : ""}`.trim();
      el.fileNode.className = `card record-node file-node ${state.exported ? "active" : ""}`.trim();
      el.analysisNode.className = `card record-node analysis-node ${state.analyzed ? "active" : ""}`.trim();
      el.phase.textContent = state.phase;
      el.detail.textContent = state.detail;
      el.stepLabel.textContent = `步骤 ${index + 1} / ${states.length}`;
      el.progress.style.width = `${((index + 1) / states.length) * 100}%`;
    }

    function stop() { window.clearInterval(timer); timer = 0; el.play.textContent = "自动演示"; }
    function advance() { index = (index + 1) % states.length; render(); if (index === states.length - 1) stop(); }
    root.querySelector('[data-action="next"]').addEventListener("click", () => { stop(); advance(); });
    root.querySelector('[data-action="reset"]').addEventListener("click", () => { stop(); index = 0; render(); });
    el.play.addEventListener("click", () => { if (timer) { stop(); return; } if (index === states.length - 1) index = 0; render(); el.play.textContent = "暂停"; timer = window.setInterval(advance, 2800); });
    render();
  })();
</script>
