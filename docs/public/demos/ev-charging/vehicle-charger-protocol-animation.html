      phase: &#x27;安全停止&#x27;,
      direction: &#x27;car&#x27;,
      message: &#x27;BST → CST：停止原因与停止确认&#x27;,
      sub: &#x27;先降电流，再关功率、断接触器和泄放残压&#x27;,
      car: &#x27;达到目标SOC，请求停止&#x27;,
      pile: &#x27;输出电流正在下降&#x27;,
      safety: &#x27;安全联锁：执行受控停机&#x27;,
      safetyMode: &#x27;stop&#x27;,
      power: true,
      energy: &#x27;398 V · 176 → 0 A&#x27;,
      title: &#x27;安全停止：不能带着大电流直接断开&#x27;,
      detail: &#x27;收到正常停止或故障请求后，充电桩先停止升功率并降低电流，随后关闭功率模块、断开接触器并确认枪口无危险电压。&#x27;
    },
    {
      phase: &#x27;统计与结束&#x27;,
      direction: &#x27;both&#x27;,
      message: &#x27;BSD ⇄ CSD：最终状态与充电统计&#x27;,
      sub: &#x27;SOC、时间、电量和停止原因用于记录与结算&#x27;,
      car: &#x27;最终 SOC 80%&#x27;,
      pile: &#x27;本次充电 32.6 kWh&#x27;,
      safety: &#x27;安全联锁：高压已断开，可解锁&#x27;,
      safetyMode: &#x27;safe&#x27;,
      power: false,
      energy: &#x27;0 V · 0 A · 会话结束&#x27;,
      title: &#x27;统计结束：车桩协议完成，运营系统继续结算&#x27;,
      detail: &#x27;双方交换最终SOC、温度、停止原因等统计数据；桩再通过桩云协议上传电量和订单，确认安全后解除电子锁。&#x27;
    }
  ];

  const ui = {
    prev: root.querySelector(&#x27;#vc-prev&#x27;),
    play: root.querySelector(&#x27;#vc-play&#x27;),
    next: root.querySelector(&#x27;#vc-next&#x27;),
    phase: root.querySelector(&#x27;#vc-phase&#x27;),
    path: root.querySelector(&#x27;#vc-data-path&#x27;),
    packet: root.querySelector(&#x27;#vc-packet&#x27;),
    message: root.querySelector(&#x27;#vc-message&#x27;),
    messageSub: root.querySelector(&#x27;#vc-message-sub&#x27;),
    carLive: root.querySelector(&#x27;#vc-car-live&#x27;),
    pileLive: root.querySelector(&#x27;#vc-pile-live&#x27;),
    energy: root.querySelector(&#x27;#vc-energy&#x27;),
    energyPulse: root.querySelector(&#x27;#vc-energy-pulse&#x27;),
    energyValue: root.querySelector(&#x27;#vc-energy-value&#x27;),
    safetyDot: root.querySelector(&#x27;#vc-safety-dot&#x27;),
    safetyText: root.querySelector(&#x27;#vc-safety-text&#x27;),
    detailTitle: root.querySelector(&#x27;#vc-detail-title&#x27;),
    detailText: root.querySelector(&#x27;#vc-detail-text&#x27;),
    progress: [...root.querySelectorAll(&#x27;.vc-progress button&#x27;)]
  };

  let index = 0;
  let playing = false;
  let timer = null;
  let run = 0;
  const reduced = window.matchMedia(&#x27;(prefers-reduced-motion: reduce)&#x27;).matches;

  function refreshIcons() {
    if (window.lucide) window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
  }

  function packetColor(direction) {
    return direction === &#x27;pile&#x27; ? &#x27;var(--viz-series-4)&#x27; : &#x27;var(--viz-series-1)&#x27;;
  }

  function animatePacket(step, currentRun) {
    const duration = reduced ? 30 : 850;
    const start = step.direction === &#x27;pile&#x27; ? 735 : 185;
    const end = step.direction === &#x27;pile&#x27; ? 185 : 735;
    ui.path.style.stroke = packetColor(step.direction);
    ui.packet.style.fill = packetColor(step.direction);
    ui.packet.style.transition = &#x27;none&#x27;;
    ui.packet.setAttribute(&#x27;cx&#x27;, String(start));
    ui.packet.getBoundingClientRect();
    ui.packet.style.transition = reduced ? &#x27;none&#x27; : `cx ${duration}ms cubic-bezier(.2,.7,.3,1)`;
    ui.packet.setAttribute(&#x27;cx&#x27;, String(end));

    if (step.direction === &#x27;both&#x27; || step.direction === &#x27;loop&#x27;) {
      window.setTimeout(() =&gt; {
        if (currentRun !== run) return;
        ui.path.style.stroke = &#x27;var(--viz-series-4)&#x27;;
        ui.packet.style.fill = &#x27;var(--viz-series-4)&#x27;;
        ui.packet.style.transition = &#x27;none&#x27;;
        ui.packet.setAttribute(&#x27;cx&#x27;, &#x27;735&#x27;);
        ui.packet.getBoundingClientRect();
        ui.packet.style.transition = reduced ? &#x27;none&#x27; : `cx ${duration}ms cubic-bezier(.2,.7,.3,1)`;
        ui.packet.setAttribute(&#x27;cx&#x27;, &#x27;185&#x27;);
      }, duration + (reduced ? 10 : 180));
    }

    if (step.power) {
      ui.energyPulse.style.opacity = &#x27;1&#x27;;
      ui.energyPulse.style.transition = &#x27;none&#x27;;
      ui.energyPulse.setAttribute(&#x27;cx&#x27;, &#x27;735&#x27;);
      ui.energyPulse.getBoundingClientRect();
      ui.energyPulse.style.transition = reduced ? &#x27;none&#x27; : `cx ${duration * 1.25}ms linear`;
      ui.energyPulse.setAttribute(&#x27;cx&#x27;, &#x27;185&#x27;);
    } else {
      ui.energyPulse.style.opacity = &#x27;0&#x27;;
    }
  }

  function render(animate = true) {
    const step = steps[index];
    run += 1;
    const currentRun = run;
    ui.phase.textContent = `${index + 1} / ${steps.length}　${step.phase}`;
    ui.message.textContent = step.message;
    ui.messageSub.textContent = step.sub;
    ui.carLive.textContent = step.car;
    ui.pileLive.textContent = step.pile;
    ui.energy.classList.toggle(&#x27;is-active&#x27;, step.power);
    ui.energyValue.textContent = step.energy;
    ui.safetyText.textContent = step.safety;
    ui.safetyDot.classList.remove(&#x27;is-safe&#x27;, &#x27;is-stop&#x27;);
    if (step.safetyMode === &#x27;safe&#x27;) ui.safetyDot.classList.add(&#x27;is-safe&#x27;);
    if (step.safetyMode === &#x27;stop&#x27;) ui.safetyDot.classList.add(&#x27;is-stop&#x27;);
    ui.detailTitle.textContent = step.title;
    ui.detailText.textContent = step.detail;
    ui.prev.disabled = index === 0;
    ui.next.disabled = index === steps.length - 1;
    ui.progress.forEach((button, buttonIndex) =&gt; {
      button.toggleAttribute(&#x27;aria-current&#x27;, buttonIndex === index);
      if (buttonIndex === index) button.setAttribute(&#x27;aria-current&#x27;, &#x27;step&#x27;);
      button.classList.toggle(&#x27;is-done&#x27;, buttonIndex &lt; index);
    });
    if (animate) animatePacket(step, currentRun);
  }

  function stop() {
    playing = false;
    window.clearTimeout(timer);
    ui.play.innerHTML = &#x27;&lt;i data-lucide=&quot;play&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; 自动演示&#x27;;
    refreshIcons();
  }

  function schedule() {
    if (!playing) return;
    timer = window.setTimeout(() =&gt; {
      if (index &gt;= steps.length - 1) {
        stop();
        return;
      }
      index += 1;
      render(true);
      schedule();
    }, reduced ? 500 : 2600);
  }

  ui.prev.addEventListener(&#x27;click&#x27;, () =&gt; {
    stop();
    index = Math.max(0, index - 1);
    render(true);
  });
  ui.next.addEventListener(&#x27;click&#x27;, () =&gt; {
    stop();
    index = Math.min(steps.length - 1, index + 1);
    render(true);
  });
  ui.play.addEventListener(&#x27;click&#x27;, () =&gt; {
    if (playing) {
      stop();
      return;
    }
    if (index === steps.length - 1) index = 0;
    playing = true;
    ui.play.innerHTML = &#x27;&lt;i data-lucide=&quot;pause&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; 暂停&#x27;;
    refreshIcons();
    render(true);
    schedule();
  });
  ui.progress.forEach(button =&gt; {
    button.addEventListener(&#x27;click&#x27;, () =&gt; {
      stop();
      index = Number(button.dataset.step);
      render(true);
    });
  });

  render(false);
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;

(() =&gt; {

    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });

  if (globalThis.lucide != null) {
    initialize();
    return;

  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
